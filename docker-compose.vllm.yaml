services:
  axon-vllm:
    image: vllm/vllm-openai:${VLLM_IMAGE_TAG:-latest}
    container_name: axon-vllm
    restart: unless-stopped
    ipc: host
    gpus: all
    ports:
      - "${VLLM_PORT:-8010}:8000"
    volumes:
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    environment:
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-${HF_TOKEN:-}}
      VLLM_WORKER_MULTIPROC_METHOD: spawn
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      - --runner
      - pooling
      - --convert
      - embed
      - --trust-remote-code
      - --dtype
      - ${VLLM_DTYPE:-auto}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-8192}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.75}
      - --max-num-seqs
      - ${VLLM_MAX_NUM_SEQS:-256}
      - --max-num-batched-tokens
      - ${VLLM_MAX_NUM_BATCHED_TOKENS:-65536}
      - --served-model-name
      - ${VLLM_SERVED_MODEL_NAME:-axon-embedding}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models', timeout=2).read()"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
