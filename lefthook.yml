# Hook strategy:
#   pre-commit — fast, staged-file-scoped checks only. Target <30s.
#     Anything that requires a workspace compile (clippy, test) belongs on
#     pre-push so it runs once before publishing, not on every WIP commit.
#   pre-push — full workspace clippy + lib tests. The authoritative local
#     gate before a branch hits CI.
#
# Previous shape ran `cargo clippy --workspace --all-targets` AND
# `cargo nextest run --workspace --lib` on every commit. Both write to the
# same `target/` and serialize on the build lock, so the "parallel" knob
# was a lie — each commit cost ~7 minutes. The work was moved to pre-push
# in 2026-05 (axon_rust-9pbb follow-up). See PR #133.

pre-commit:
  parallel: true
  commands:
    compose-ports:
      run: python3 scripts/check_compose_port_bindings.py --staged
    secrets:
      run: cargo xtask check-secrets
    env-guard:
      run: cargo xtask check-env-staged
    claude-symlinks:
      run: cargo xtask check-claude-symlinks
    broken-symlinks:
      run: cargo xtask check-broken-symlinks
    mcp-http-only:
      glob: "**/*.rs"
      run: cargo xtask check-mcp-http
    no-mod-rs:
      glob: "**/*.rs"
      run: cargo xtask check-no-mod-rs
    unwrap-warn:
      glob: "**/*.rs"
      run: cargo xtask check-unwraps
    skills-ref:
      glob: "skills/**"
      run: ./scripts/validate_skills_ref.sh
    mcp-schema-doc:
      glob: "crates/mcp/schema.rs"
      run: python3 scripts/generate_mcp_schema_doc.py && git add docs/MCP-TOOL-SCHEMA.md
    monolith:
      run: >
        if [ -f "scripts/enforce_monoliths.py" ]; then
          python3 "scripts/enforce_monoliths.py" --staged;
        elif [ -f "$HOME/.claude/hooks/enforce_monoliths.py" ]; then
          python3 "$HOME/.claude/hooks/enforce_monoliths.py" --staged;
        else
          echo "ERROR enforce_monoliths.py not found in scripts/ or ~/.claude/hooks/" >&2; exit 1;
        fi
    taplo:
      glob: "**/*.toml"
      run: command -v taplo >/dev/null 2>&1 && taplo fmt --check {staged_files} || true
    rustfmt:
      glob: "**/*.rs"
      run: cargo fmt -- --check

pre-push:
  parallel: true
  commands:
    clippy:
      run: cargo clippy --workspace --all-targets --locked -- -D warnings
    test:
      run: >
        if command -v cargo-nextest >/dev/null 2>&1; then
          cargo nextest run --workspace --locked --lib -E 'not test(/worker_e2e/)';
        else
          cargo test --workspace --locked --lib -- --skip worker_e2e;
        fi
