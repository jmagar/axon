pre-commit:
  parallel: true
  commands:
    compose-ports:
      run: python3 scripts/check_compose_port_bindings.py --staged
    env-guard:
      run: cargo xtask check-env-staged
    claude-symlinks:
      run: cargo xtask check-claude-symlinks
    broken-symlinks:
      run: cargo xtask check-broken-symlinks
    mcp-http-only:
      glob: "**/*.rs"
      run: cargo xtask check-mcp-http
    no-mod-rs:
      glob: "**/*.rs"
      run: cargo xtask check-no-mod-rs
    unwrap-warn:
      glob: "**/*.rs"
      run: cargo xtask check-unwraps
    skills-ref:
      glob: "skills/**"
      run: ./scripts/validate_skills_ref.sh
    mcp-schema-doc:
      glob: "crates/mcp/schema.rs"
      run: python3 scripts/generate_mcp_schema_doc.py && git add docs/MCP-TOOL-SCHEMA.md
    monolith:
      run: >
        if [ -f "scripts/enforce_monoliths.py" ]; then
          python3 "scripts/enforce_monoliths.py" --staged;
        elif [ -f "$HOME/.claude/hooks/enforce_monoliths.py" ]; then
          python3 "$HOME/.claude/hooks/enforce_monoliths.py" --staged;
        else
          echo "ERROR enforce_monoliths.py not found in scripts/ or ~/.claude/hooks/" >&2; exit 1;
        fi
    taplo:
      glob: "**/*.toml"
      run: taplo fmt --check {staged_files}
    rustfmt:
      glob: "**/*.rs"
      run: cargo fmt -- --check
    # clippy --all-targets already type-checks tests; we don't need a separate
    # `cargo check`. Test coverage runs on pre-push / CI, not pre-commit:
    # `cargo test --workspace` on this codebase takes minutes per commit and
    # contends with clippy on the same target/ build lock.
    clippy:
      glob: "**/*.{rs,toml}"
      run: cargo clippy --workspace --all-targets --locked -- -D warnings
    test:
      glob: "**/*.{rs,toml}"
      run: >
        if command -v cargo-nextest >/dev/null 2>&1; then
          cargo nextest run --workspace --locked --lib -E 'not test(/worker_e2e/)';
        else
          cargo test --workspace --locked --lib -- --skip worker_e2e;
        fi
