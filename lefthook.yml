# Hook strategy:
#   pre-commit — fast, staged-file-scoped checks only. Target <30s.
#     Every command is wrapped with scripts/with_timeout.sh so a single
#     misbehaving check can't wedge a commit indefinitely.
#     Anything that requires a workspace compile (clippy, test) belongs on
#     pre-push so it runs once before publishing, not on every WIP commit.
#   pre-push — temporary pipeline-unification guardrail only. Keep this under
#     one minute while the refactor is landing; run heavier validation
#     explicitly when a slice needs it.
#
# Regressions are enforced two ways:
#   - lefthook-speed hook below + scripts/check_lefthook_pre_commit_speed.py
#     fail the moment anyone adds a `cargo … --workspace` (or similar) to
#     pre-commit.
#   - The same script runs in CI as a standalone job.

pre-commit:
  parallel: true
  commands:
    compose-ports:
      glob: "{docker-compose,compose}*.{yaml,yml}"
      run: scripts/with_timeout.sh 30 -- python3 scripts/check_compose_port_bindings.py --staged
    xtask-check:
      # Keep pre-commit to fast structural checks. Full aggregate
      # `xtask check` can regenerate artifacts and exceed the hook budget during
      # broad refactors, so it belongs in explicit verification/CI instead.
      glob: "**/*"
      run: >
        scripts/with_timeout.sh 60 --
        bash -c '
          if [ -x "./target/debug/xtask" ]; then
            ./target/debug/xtask check-no-mod-rs;
            ./target/debug/xtask check-layering;
            ./target/debug/xtask check-claude-symlinks;
          else
            cargo xtask check-no-mod-rs;
            cargo xtask check-layering;
            cargo xtask check-claude-symlinks;
          fi
        '
    skills-ref:
      glob: "skills/**"
      run: scripts/with_timeout.sh 30 -- ./scripts/validate_skills_ref.sh
    mcp-schema-doc:
      glob: "crates/axon-api/src/mcp_schema.rs"
      run: scripts/with_timeout.sh 30 -- scripts/check_mcp_schema_doc.sh
    helper-shell-scripts:
      glob: "scripts/{build-on-steamy,test-ask-gemma4}.sh"
      run: >
        scripts/with_timeout.sh 30 --
        bash -c '
          bash -n "$@";
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck "$@";
          else
            echo "shellcheck not found; skipped optional shell lint" >&2;
          fi
        ' -- {staged_files}
    monolith:
      glob: "**/*.rs"
      run: >
        scripts/with_timeout.sh 30 --
        bash -c '
          if [ -f "scripts/enforce_monoliths.py" ]; then
            python3 "scripts/enforce_monoliths.py" --staged;
          elif [ -f "$HOME/.claude/hooks/enforce_monoliths.py" ]; then
            python3 "$HOME/.claude/hooks/enforce_monoliths.py" --staged;
          else
            echo "ERROR enforce_monoliths.py not found in scripts/ or ~/.claude/hooks/" >&2; exit 1;
          fi
        '
    taplo:
      # Hard-fail if taplo is missing — silently bypassing TOML formatting
      # because the developer didn't install taplo defeats the purpose of
      # the gate. Install via: cargo install --locked taplo-cli
      glob: "**/*.toml"
      run: scripts/with_timeout.sh 30 -- taplo fmt --check {staged_files}
    rustfmt:
      glob: "**/*.rs"
      run: scripts/with_timeout.sh 30 -- cargo fmt -- --check {staged_files}
    lefthook-speed:
      glob: "lefthook.yml"
      run: scripts/with_timeout.sh 10 -- python3 scripts/check_lefthook_pre_commit_speed.py

pre-push:
  parallel: false
  commands:
    structural-checks:
      run: >
        scripts/with_timeout.sh 60 --
        bash -c '
          if [ -x "./target/debug/xtask" ]; then
            ./target/debug/xtask check-no-mod-rs;
            ./target/debug/xtask check-layering;
            ./target/debug/xtask check-claude-symlinks;
          else
            cargo xtask check-no-mod-rs;
            cargo xtask check-layering;
            cargo xtask check-claude-symlinks;
          fi
        '
