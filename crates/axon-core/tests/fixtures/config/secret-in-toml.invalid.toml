# Illustrates the "no secrets in config.toml" contract rule
# (docs/pipeline-unification/schemas/config-schema.md's Drift Checks: "secret
# appears in config.toml"; docs/pipeline-unification/configuration/
# config-contract.md's Design Rules: "Secrets and deployment URLs stay in
# `.env`").
#
# NOT WIRED to a test (2026-07-12 alignment audit, bead axon_rust-ldozg):
# axon-core's real config.toml schema
# (crates/axon-core/src/config/parse/toml_config/raw.rs) has no secret-shaped
# field anywhere, by design — secrets only ever live in `.env`. There is no
# dedicated semantic "this value looks like a secret" detector in axon-core
# today. This fixture's `http-token` key would be rejected only because it
# isn't a recognized `[server]` field (structural `deny_unknown_fields`), the
# same generic mechanism `unknown-key.invalid.toml` already exercises — not
# because axon-core recognizes the value as a secret. Kept as illustrative
# content for when a real secret-shape drift check is implemented.
[server]
default-collection = "axon"
http-token = "sk-live-fake-example-not-a-real-secret-0000000000"
