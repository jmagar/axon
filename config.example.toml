# Axon configuration — tuning knobs only.
# Copy to ~/.axon/config.toml or point AXON_CONFIG_PATH at a custom location.
#
# Usage:
#   mkdir -m 700 ~/.axon
#   cp config.example.toml ~/.axon/config.toml
#   chmod 600 ~/.axon/config.toml
#
# All values shown are defaults. Uncomment only what you need to change.
#
# Secrets, endpoint URLs, auth/runtime bootstrap, and Docker Compose
# interpolation belong in ~/.axon/.env — not here.
# This file is safe to commit to source control.
#
# Override path: AXON_CONFIG_PATH=/path/to/config.toml
#
# Priority (highest to lowest):
#   CLI flags for command inputs > environment variables > this file > built-in defaults
#
# Every key below is wired through Config: setting it in this file takes effect.
# The env var shown next to each key still overrides the TOML value at the same
# priority described above.

# Service endpoint URLs are intentionally not configured here.
# Put QDRANT_URL, TEI_URL, and AXON_CHROME_REMOTE_URL
# in ~/.axon/.env. QDRANT_URL and TEI_URL also have temporary CLI overrides.

[llm]
# Non-secret model names can be set here. Env vars still win.
# Existing AXON_OPENAI_MODEL and AXON_HEADLESS_GEMINI_MODEL are treated as
# synthesis-model aliases for backwards compatibility.
#
# Env: AXON_SYNTHESIS_OPENAI_MODEL or AXON_OPENAI_MODEL
# synthesis-openai-model = ""
#
# Env: AXON_CHAT_OPENAI_MODEL
# chat-openai-model = ""
#
# Env: AXON_SYNTHESIS_HEADLESS_GEMINI_MODEL or AXON_HEADLESS_GEMINI_MODEL
# synthesis-gemini-model = ""
#
# Env: AXON_CHAT_HEADLESS_GEMINI_MODEL
# chat-gemini-model = ""

[search]
# Enable RRF hybrid search (requires a named-mode Qdrant collection).
# Disable if your collection is legacy unnamed-mode.
# Env: AXON_HYBRID_SEARCH
# hybrid-enabled = true

# Candidates per prefetch arm before RRF fusion (clamped 10–500).
# Higher = better recall, slower query.
# Env: AXON_HYBRID_CANDIDATES
# hybrid-candidates = 100

# Hybrid prefetch window for the ask pipeline (clamped 10–500).
# Wider than hybrid-candidates to give reranking more material.
# Env: AXON_ASK_HYBRID_CANDIDATES
# ask-hybrid-candidates = 150

# HNSW ef for named-mode (dense+sparse) collections (clamped 32–512).
# Higher = better recall, more RAM/CPU.
# Env: AXON_HNSW_EF_SEARCH
# hnsw-ef = 128

# HNSW ef for legacy unnamed-mode collections (clamped 16–256).
# Env: AXON_HNSW_EF_SEARCH_LEGACY
# hnsw-ef-legacy = 64

# Default Qdrant collection name.
# Env: AXON_COLLECTION (or --collection flag)
# collection = "axon"

[ask]
# LLM synthesis defaults to Gemini headless. Configure AXON_LLM_BACKEND and
# backend-specific runtime variables in the env layer rather than config.toml.

# Max context characters passed to the LLM (clamped 20_000–1_000_000).
# Env: AXON_ASK_MAX_CONTEXT_CHARS
# max-context-chars = 300000

# Max chunks returned per ask query (clamped 3–40).
# Env: AXON_ASK_CHUNK_LIMIT
# chunk-limit = 20

# Max candidate chunks fetched before scoring (clamped 8–300).
# Env: AXON_ASK_CANDIDATE_LIMIT
# candidate-limit = 250

# Max full documents included in context (clamped 1–20).
# Env: AXON_ASK_FULL_DOCS
# full-docs = 6

# Backfill chunks from top documents to pad context (clamped 0–20).
# Env: AXON_ASK_BACKFILL_CHUNKS
# backfill-chunks = 5

# Concurrent document fetches during context build (clamped 1–16).
# Env: AXON_ASK_DOC_FETCH_CONCURRENCY
# doc-fetch-concurrency = 4

# Max chunks per document in context (clamped 8–2000).
# Env: AXON_ASK_DOC_CHUNK_LIMIT
# doc-chunk-limit = 96

# Minimum relevance score to include a chunk (clamped -1.0–2.0).
# Lower = more results, more noise. Higher = stricter but may miss relevant chunks.
# Env: AXON_ASK_MIN_RELEVANCE_SCORE
# min-relevance-score = 0.45

# Domains treated as authoritative during reranking. Matches exact hosts and
# subdomains. Env override: AXON_ASK_AUTHORITATIVE_DOMAINS=code.claude.com,docs.rs
# authoritative-domains = ["code.claude.com"]

# Boost weight for authoritative domains (clamped 0.0–0.5).
# Env: AXON_ASK_AUTHORITATIVE_BOOST
# authoritative-boost = 0.12

# Min unique citations for non-trivial answers (clamped 1–5).
# Env: AXON_ASK_MIN_CITATIONS_NONTRIVIAL
# min-citations-nontrivial = 2

[ask.cache]
# [wired] In-process document-chunk cache for the ask full-doc fetch path.
# Process-local: only useful in long-lived parents (`axon serve`, `axon mcp`).
# CLI one-shots see zero hit rate by definition. Default: disabled.
# (bd axon_rust-pmc)
# enabled = false

# [wired] Max bytes (summed `chunk_text` length across cached entries).
# Default: 268_435_456 (256 MiB).
# max-capacity-bytes = 268435456

# [wired] Time-to-live for cached entries, in seconds. Hard-capped at 300s
# (security primitive bounding staleness of deleted content). Default: 300.
# ttl-secs = 300

[ask.adaptive]
# Adaptive ask heuristics. (bd axon_rust-30y)
#
# Full-doc fetch skip gate: when the reranked top-K already covers enough
# unique URLs, chunk bytes, and quality, the full-doc backfill stage is
# elided entirely. `ask` normally runs as a Gemini-backed one-shot prompt with
# a large context window, so the default favors recall and keeps this disabled.
#
# Mode-aware quality floor (per crates/vector/CLAUDE.md Ranking Pipeline):
#  - Cosine paths (Unnamed / dense-only Named): every top-K score must
#    satisfy `>= ask_min_relevance_score + fulldoc-skip-score-delta`.
#  - RRF path (Named + hybrid + non-empty sparse): every top-K score must
#    sit in the top quartile (P75) of all reranked candidates. The
#    `score-delta` knob is intentionally ignored because rank-fusion
#    output is unitless.
#
# Diagnostics surface the result as `full_doc_fetch_skipped: bool` and
# `full_doc_fetch_skip_reason: "ok_skip" | "disabled" | "insufficient_urls" |
# "insufficient_chars" | "low_top_scores" | "empty_top_k"`.
#
# Default: disabled (false). Enable only if `axon evaluate` shows no quality
# regression for your corpus and you need to reduce context assembly cost.
# fulldoc-skip-enabled = false

# [wired] Minimum unique URLs required in reranked top-K (clamped 1–50).
# Default: 3.
# fulldoc-skip-min-urls = 3

# [wired] Minimum total chunk_text bytes summed across reranked top-K
# (clamped 500–200_000). Default: 4000.
# fulldoc-skip-min-chars = 4000

# [wired] Cosine-mode score floor offset on top of `ask_min_relevance_score`
# (clamped 0.0–1.0). Default: 0.15. Ignored on the RRF path.
# fulldoc-skip-score-delta = 0.15

[tei]
# Max retry attempts after the initial TEI request.
# Env: TEI_MAX_RETRIES
# max-retries = 5

# Per-attempt timeout in milliseconds.
# Env: TEI_REQUEST_TIMEOUT_MS
# request-timeout-ms = 30000

# Default batch size sent to TEI; auto-splits on HTTP 413.
# Env: TEI_MAX_CLIENT_BATCH_SIZE
# max-client-batch-size = 64

[workers]
# Parallel ingest worker lanes (GitHub, Reddit, YouTube; clamped 1-16).
# Env: AXON_INGEST_LANES
# ingest-lanes = 2

# Parallel embed worker lanes (clamped 1-32).
# Env: AXON_EMBED_LANES
# embed-lanes = 2

# Per-document embed timeout in seconds.
# Env: AXON_EMBED_DOC_TIMEOUT_SECS
# embed-doc-timeout-secs = 300

# Queue summary interval in seconds (0 = disabled, clamped 0-3600).
# Env: AXON_QUEUE_SUMMARY_SECS
# queue-summary-secs = 30

# Buffered Qdrant points before flush (clamped 128-16384).
# Env: AXON_QDRANT_POINT_BUFFER
# qdrant-point-buffer = 256

# Crawl queue cap — reject new jobs above this count (0 = unlimited).
# Env: AXON_MAX_PENDING_CRAWL_JOBS
# max-pending-crawl-jobs = 100

# Embed queue cap — reject new jobs above this count (0 = unlimited).
# Env: AXON_MAX_PENDING_EMBED_JOBS
# max-pending-embed-jobs = 50

# Extract queue cap — reject new jobs above this count (0 = unlimited).
# Env: AXON_MAX_PENDING_EXTRACT_JOBS
# max-pending-extract-jobs = 50

# Ingest queue cap — reject new jobs above this count (0 = unlimited).
# Env: AXON_MAX_PENDING_INGEST_JOBS
# max-pending-ingest-jobs = 50

# Timeout in seconds for --wait true job polling (clamped 30-3600).
# Env: AXON_JOB_WAIT_TIMEOUT_SECS
# job-wait-timeout-secs = 300

# Override crawl and backfill concurrency at once. Default comes from
# performance-profile.
# concurrency-limit = 128

# Override crawl concurrency. Default comes from performance-profile.
# crawl-concurrency-limit = 128

# Override sitemap backfill concurrency. Default comes from performance-profile.
# backfill-concurrency-limit = 64

# Seconds before a running job is considered stale. Env still overrides TOML.
# Env: AXON_JOB_STALE_TIMEOUT_SECS
# watchdog-stale-timeout-secs = 300

# Additional grace period before stale reclaim. Env still overrides TOML.
# Env: AXON_JOB_STALE_CONFIRM_SECS
# watchdog-confirm-secs = 60

# Seconds between watchdog sweeps. Env still overrides TOML.
# Env: AXON_WATCHDOG_SWEEP_SECS
# watchdog-sweep-secs = 15

[chrome]
# Custom User-Agent header sent by Chrome. Leave unset to use Spider's default.
# Env: AXON_CHROME_USER_AGENT
# user-agent = "Mozilla/5.0 (compatible; Axon/1.0)"

# Bypass Content Security Policy in Chrome.
# bypass-csp = false

# Accept invalid or self-signed TLS certificates in Chrome.
# accept-invalid-certs = false

# Seconds to wait for Chrome network idle before page capture.
# network-idle-timeout-secs = 15

# Remote Chrome bootstrap probe timeout in milliseconds (clamped to at least 250).
# bootstrap-timeout-ms = 3000

# Remote Chrome bootstrap probe retries (clamped 0-10).
# bootstrap-retries = 2

# Log rotation is configured via env var only (not TOML), because
# init_tracing() runs before Config is built.
# Env: AXON_LOG_MAX_BYTES (default: 10485760 = 10 MiB; 0 = disable rotation)

# ─── Webclaw Port (axon_rust-zehr) ───────────────────────────────────────────

[scrape]
# Respect robots.txt directives.
# respect-robots = false

# Thin-page threshold in markdown characters.
# min-markdown-chars = 200

# Skip thin pages instead of saving or embedding them.
# drop-thin-markdown = true

# Discover and backfill URLs from sitemap.xml after crawl.
# discover-sitemaps = true

# Only backfill sitemap URLs with a <lastmod> date within the last N days.
# 0 disables the age filter.
# sitemap-since-days = 0

# Maximum number of sitemap documents to parse. 0 = unlimited.
# max-sitemaps = 512

# Probe /llms.txt at the site root, parse its markdown links, and merge them into
# the sitemap-backfill candidate set (and into `map` discovery).
# discover-llms-txt = true

# Maximum number of URLs to take from a single /llms.txt after scope filtering.
# 0 = unlimited.
# max-llms-txt-urls = 512

# Delay between requests in milliseconds.
# delay-ms = 0

# Per-request HTTP timeout. Unset to use performance-profile default.
# request-timeout-ms = 20000

# End-to-end timeout for one service-level scrape batch.
# Env: AXON_SCRAPE_BATCH_TIMEOUT_SECS
# batch-timeout-secs = 120

# Fetch retry count. Unset to use performance-profile default.
# fetch-retries = 2

# Retry backoff in milliseconds. Unset to use performance-profile default.
# retry-backoff-ms = 250

# Thin-page ratio that triggers auto-switch to Chrome.
# auto-switch-thin-ratio = 0.60

# Minimum page count before auto-switch eligibility check.
# auto-switch-min-pages = 10

# Only crawl URLs matching these regex patterns.
# url-whitelist = ["^https://example\\.com/docs/"]

# Maximum response size per page in bytes. 0 = unlimited.
# max-page-bytes = 0

# Only follow same-origin redirects.
# redirect-policy-strict = false

# DOM retry ladder Strategy 1 threshold (words). Re-run extraction with
# `only_main_content=false` when scored extractor produces fewer words.
# Env: AXON_LADDER_STRATEGY1_THRESHOLD. Default: 30. Clamped 1–1000.
# ladder-strategy1-threshold = 30

# DOM retry ladder Strategy 2 threshold (words). Re-run extraction with
# `include_selectors=["body"]` when scored extractor produces fewer words
# AND no user `include_selectors` were supplied.
# Env: AXON_LADDER_STRATEGY2_THRESHOLD. Default: 200. Clamped 1–10000.
# ladder-strategy2-threshold = 200

# Body-fallback multiplier: body wins only if it produces N x scored words.
# Env: AXON_LADDER_BODY_MULTIPLIER. Default: 2.0. Clamped 1.0–10.0.
# ladder-body-multiplier = 2.0

[verticals]
# Enable per-site vertical extractors (GitHub, PyPI, Reddit, HN, etc.).
# Env: AXON_ENABLE_VERTICALS. Default: true.
# enabled = true

# Vertical extractor names to SKIP in auto-dispatch (still available via
# `--vertical <name>` or MCP `vertical_scrape`).
# Env: AXON_AUTO_DISPATCH_SKIP (comma-separated). Default: empty.
# auto-dispatch-skip = ["amazon_product", "ebay_listing"]

# Per-vertical cache TTL in seconds. Built-in defaults: github=86400,
# reddit=3600, hn=21600. Override per-vertical via
# AXON_VERTICAL_CACHE_TTL_<UPPER>=secs or this table:
# [verticals.cache-ttl-secs]
# github = 86400
# reddit = 3600
# hn = 21600

[antibot]
# Enable Akamai/Cloudflare cookie warmup retry on antibot challenge.
# Env: AXON_CHALLENGE_WARMUP. Default: true.
# cookie-warmup = true

# Maximum bytes scanned for antibot challenge patterns (per-page).
# Env: AXON_ANTIBOT_MAX_BODY_SCAN_BYTES. Default: 150000. Clamped 1000–10485760.
# max-body-scan-bytes = 150000

[payload]
# Maximum bytes stored in Qdrant `structured_blob` payload per chunk.
# Larger payloads (e.g. multi-MB __NEXT_DATA__) are dropped rather than
# serialized.
# Env: AXON_STRUCTURED_DATA_MAX_BYTES. Default: 65536 (64 KiB). Clamped 1024–16777216.
# structured-data-max-bytes = 65536
