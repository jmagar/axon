# Axon configuration — tuning knobs only.
# Copy to ~/.axon/config.toml or point AXON_CONFIG_PATH at a custom location.
#
# Usage:
#   mkdir -m 700 ~/.axon
#   cp config.example.toml ~/.axon/config.toml
#   chmod 600 ~/.axon/config.toml
#
# All values shown are defaults. Uncomment only what you need to change.
#
# Secrets, endpoint URLs, auth/runtime bootstrap, and Docker Compose
# interpolation belong in ~/.axon/.env — not here.
# This file is safe to commit to source control.
#
# Override path: AXON_CONFIG_PATH=/path/to/config.toml
#
# Priority (highest to lowest):
#   CLI flags > environment variables > this file > built-in defaults
#
# Every key below is wired through Config: setting it in this file takes effect.
# The env var shown next to each key still overrides the TOML value at the same
# priority described above.

# Service endpoint URLs are intentionally not configured here.
# Put QDRANT_URL, TEI_URL, and AXON_CHROME_REMOTE_URL in ~/.axon/.env
# or pass --qdrant-url / --tei-url / --chrome-remote-url on the CLI.

[search]
# Enable RRF hybrid search (requires a named-mode Qdrant collection).
# Disable if your collection is legacy unnamed-mode.
# Env: AXON_HYBRID_SEARCH
# hybrid-enabled = true

# Candidates per prefetch arm before RRF fusion (clamped 10–500).
# Higher = better recall, slower query.
# Env: AXON_HYBRID_CANDIDATES
# hybrid-candidates = 100

# Hybrid prefetch window for the ask pipeline (clamped 10–500).
# Wider than hybrid-candidates to give reranking more material.
# Env: AXON_ASK_HYBRID_CANDIDATES
# ask-hybrid-candidates = 150

# HNSW ef for named-mode (dense+sparse) collections (clamped 32–512).
# Higher = better recall, more RAM/CPU.
# Env: AXON_HNSW_EF_SEARCH
# hnsw-ef = 128

# HNSW ef for legacy unnamed-mode collections (clamped 16–256).
# Env: AXON_HNSW_EF_SEARCH_LEGACY
# hnsw-ef-legacy = 64

# Default Qdrant collection name.
# Env: AXON_COLLECTION (or --collection flag)
# collection = "cortex"

[ask]
# LLM synthesis uses Gemini headless. Override the Gemini model with
# AXON_HEADLESS_GEMINI_MODEL in the env layer rather than config.toml.

# Max context characters passed to the LLM (clamped 20_000–1_000_000).
# Env: AXON_ASK_MAX_CONTEXT_CHARS
# max-context-chars = 300000

# Max chunks returned per ask query (clamped 3–40).
# Env: AXON_ASK_CHUNK_LIMIT
# chunk-limit = 20

# Max candidate chunks fetched before scoring (clamped 8–300).
# Env: AXON_ASK_CANDIDATE_LIMIT
# candidate-limit = 250

# Max full documents included in context (clamped 1–20).
# Env: AXON_ASK_FULL_DOCS
# full-docs = 6

# Backfill chunks from top documents to pad context (clamped 0–20).
# Env: AXON_ASK_BACKFILL_CHUNKS
# backfill-chunks = 5

# Concurrent document fetches during context build (clamped 1–16).
# Env: AXON_ASK_DOC_FETCH_CONCURRENCY
# doc-fetch-concurrency = 4

# Max chunks per document in context (clamped 8–2000).
# Env: AXON_ASK_DOC_CHUNK_LIMIT
# doc-chunk-limit = 96

# Minimum relevance score to include a chunk (clamped -1.0–2.0).
# Lower = more results, more noise. Higher = stricter but may miss relevant chunks.
# Env: AXON_ASK_MIN_RELEVANCE_SCORE
# min-relevance-score = 0.45

# Domains treated as authoritative during reranking. Matches exact hosts and
# subdomains. Env override: AXON_ASK_AUTHORITATIVE_DOMAINS=code.claude.com,docs.rs
# authoritative-domains = ["code.claude.com"]

# Boost weight for authoritative domains (clamped 0.0–0.5).
# Env: AXON_ASK_AUTHORITATIVE_BOOST
# authoritative-boost = 0.12

# Min unique citations for non-trivial answers (clamped 1–5).
# Env: AXON_ASK_MIN_CITATIONS_NONTRIVIAL
# min-citations-nontrivial = 2

[ask.cache]
# [wired] In-process document-chunk cache for the ask full-doc fetch path.
# Process-local: only useful in long-lived parents (`axon serve`, `axon mcp`).
# CLI one-shots see zero hit rate by definition. Default: disabled.
# (bd axon_rust-pmc)
# enabled = false

# [wired] Max bytes (summed `chunk_text` length across cached entries).
# Default: 268_435_456 (256 MiB).
# max-capacity-bytes = 268435456

# [wired] Time-to-live for cached entries, in seconds. Hard-capped at 300s
# (security primitive bounding staleness of deleted content). Default: 300.
# ttl-secs = 300

[ask.adaptive]
# Adaptive ask heuristics. (bd axon_rust-30y)
#
# Full-doc fetch skip gate: when the reranked top-K already covers enough
# unique URLs, chunk bytes, and quality, the full-doc backfill stage is
# elided entirely. `ask` normally runs as a Gemini-backed one-shot prompt with
# a large context window, so the default favors recall and keeps this disabled.
#
# Mode-aware quality floor (per crates/vector/CLAUDE.md Ranking Pipeline):
#  - Cosine paths (Unnamed / dense-only Named): every top-K score must
#    satisfy `>= ask_min_relevance_score + fulldoc-skip-score-delta`.
#  - RRF path (Named + hybrid + non-empty sparse): every top-K score must
#    sit in the top quartile (P75) of all reranked candidates. The
#    `score-delta` knob is intentionally ignored because rank-fusion
#    output is unitless.
#
# Diagnostics surface the result as `full_doc_fetch_skipped: bool` and
# `full_doc_fetch_skip_reason: "ok_skip" | "disabled" | "insufficient_urls" |
# "insufficient_chars" | "low_top_scores" | "empty_top_k"`.
#
# Default: disabled (false). Enable only if `axon evaluate` shows no quality
# regression for your corpus and you need to reduce context assembly cost.
# fulldoc-skip-enabled = false

# [wired] Minimum unique URLs required in reranked top-K (clamped 1–50).
# Default: 3.
# fulldoc-skip-min-urls = 3

# [wired] Minimum total chunk_text bytes summed across reranked top-K
# (clamped 500–200_000). Default: 4000.
# fulldoc-skip-min-chars = 4000

# [wired] Cosine-mode score floor offset on top of `ask_min_relevance_score`
# (clamped 0.0–1.0). Default: 0.15. Ignored on the RRF path.
# fulldoc-skip-score-delta = 0.15

[tei]
# Max retry attempts after the initial TEI request.
# Env: TEI_MAX_RETRIES
# max-retries = 5

# Per-attempt timeout in milliseconds.
# Env: TEI_REQUEST_TIMEOUT_MS
# request-timeout-ms = 30000

# Default batch size sent to TEI; auto-splits on HTTP 413.
# Env: TEI_MAX_CLIENT_BATCH_SIZE
# max-client-batch-size = 64

[workers]
# Parallel ingest worker lanes (GitHub, Reddit, YouTube; clamped 1-16).
# Env: AXON_INGEST_LANES
# ingest-lanes = 2

# Parallel embed worker lanes (clamped 1-32).
# Env: AXON_EMBED_LANES
# embed-lanes = 2

# Per-document embed timeout in seconds.
# Env: AXON_EMBED_DOC_TIMEOUT_SECS
# embed-doc-timeout-secs = 300

# Queue summary interval in seconds (0 = disabled, clamped 0-3600).
# Env: AXON_QUEUE_SUMMARY_SECS
# queue-summary-secs = 30

# Buffered Qdrant points before flush (clamped 128-16384).
# Env: AXON_QDRANT_POINT_BUFFER
# qdrant-point-buffer = 256

# Crawl queue cap — reject new jobs above this count (0 = unlimited).
# Env: AXON_MAX_PENDING_CRAWL_JOBS
# max-pending-crawl-jobs = 100
