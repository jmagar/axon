# Axon configuration — tuning knobs only.
# Copy to ~/.axon/config.toml or point AXON_CONFIG_PATH at a custom location.
#
# Usage:
#   mkdir -m 700 ~/.axon
#   cp config.example.toml ~/.axon/config.toml
#   chmod 600 ~/.axon/config.toml
#
# All values shown are defaults. Uncomment only what you need to change.
#
# Secrets and security settings belong in .env — not here. Service URLs are
# safe TOML values and can be written by `axon setup deploy`.
# This file is safe to commit to source control.
#
# Override path: AXON_CONFIG_PATH=/path/to/config.toml
#
# Priority (highest to lowest):
#   CLI flags > environment variables > this file > built-in defaults
#
# Phase 1 keys (v0.36): marked "[wired]" — setting these in config.toml takes effect.
# Phase 2 keys: marked "[env-only]" — the TOML key is parsed/validated but the value
# is not yet read by the binary; use the env var shown instead for now.

[services]
# [wired] Base URL of the Qdrant vector store. CLI/env still override this.
# Env: QDRANT_URL
# qdrant-url = "http://127.0.0.1:53333"

# [wired] Base URL of the TEI embedding service. CLI/env still override this.
# Env: TEI_URL
# tei-url = "http://127.0.0.1:52000"

# [wired] Chrome management API endpoint used for rendered crawls.
# Env: AXON_CHROME_REMOTE_URL
# chrome-remote-url = "http://127.0.0.1:6000"

[search]
# [wired] Enable RRF hybrid search (requires a named-mode Qdrant collection).
# Disable if your collection is legacy unnamed-mode.
# Env: AXON_HYBRID_SEARCH
# hybrid-enabled = true

# [wired] Candidates per prefetch arm before RRF fusion (clamped 10–500).
# Higher = better recall, slower query.
# Env: AXON_HYBRID_CANDIDATES
# hybrid-candidates = 100

# [wired] Hybrid prefetch window for the ask pipeline (clamped 10–500).
# Wider than hybrid-candidates to give reranking more material.
# Env: AXON_ASK_HYBRID_CANDIDATES
# ask-hybrid-candidates = 100

# [env-only] HNSW ef for named-mode (dense+sparse) collections (clamped 32–512).
# Higher = better recall, more RAM/CPU. Use AXON_HNSW_EF_SEARCH env var for now.
# hnsw-ef = 128

# [env-only] HNSW ef for legacy unnamed-mode collections (clamped 16–256).
# Use AXON_HNSW_EF_SEARCH_LEGACY env var for now.
# hnsw-ef-legacy = 64

# [env-only] Default Qdrant collection name.
# Use AXON_COLLECTION env var or --collection flag for now.
# collection = "cortex"

[ask]
# [wired] Max chunks returned per ask query (clamped 3–40).
# Env: AXON_ASK_CHUNK_LIMIT
# chunk-limit = 10

# [wired] Max candidate chunks fetched before scoring (clamped 8–300).
# Env: AXON_ASK_CANDIDATE_LIMIT
# candidate-limit = 150

# [wired] Minimum relevance score to include a chunk (clamped -1.0–2.0).
# Lower = more results, more noise. Higher = stricter but may miss relevant chunks.
# Env: AXON_ASK_MIN_RELEVANCE_SCORE
# min-relevance-score = 0.45

[ask.cache]
# [wired] In-process document-chunk cache for the ask full-doc fetch path.
# Process-local: only useful in long-lived parents (`axon serve`, `axon mcp`).
# CLI one-shots see zero hit rate by definition. Default: disabled.
# (bd axon_rust-pmc)
# enabled = false

# [wired] Max bytes (summed `chunk_text` length across cached entries).
# Default: 268_435_456 (256 MiB).
# max-capacity-bytes = 268435456

# [wired] Time-to-live for cached entries, in seconds. Hard-capped at 300s
# (security primitive bounding staleness of deleted content). Default: 300.
# ttl-secs = 300

[tei]
# [env-only] Max retry attempts per TEI request. Use TEI_MAX_RETRIES env var for now.
# max-retries = 5

# [env-only] Per-attempt timeout in milliseconds. Use TEI_REQUEST_TIMEOUT_MS env var for now.
# request-timeout-ms = 30000

# [env-only] Default batch size sent to TEI; auto-splits on HTTP 413.
# Use TEI_MAX_CLIENT_BATCH_SIZE env var for now.
# max-client-batch-size = 64

[workers]
# [env-only] Parallel ingest worker lanes (GitHub, Reddit, YouTube).
# Use AXON_INGEST_LANES env var for now.
# ingest-lanes = 2

# [env-only] Per-document embed timeout in seconds.
# Use AXON_EMBED_DOC_TIMEOUT_SECS env var for now.
# embed-doc-timeout-secs = 300

# [env-only] Crawl queue cap — reject new jobs above this count (0 = unlimited).
# Use AXON_MAX_PENDING_CRAWL_JOBS env var for now.
# max-pending-crawl-jobs = 100
