name: axon

# Local development overlay.
#
# Use with the base compose file so the runtime service keeps the same ports,
# volumes, healthcheck, dependencies, and environment, but runs the debug
# binary copied by scripts/axon into the host-mounted ~/.axon/dev directory:
#
#   ./scripts/axon doctor
#   docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up -d axon
#
services:
  axon:
    image: axon:local
    build:
      context: .
      dockerfile: config/Dockerfile
    entrypoint: ["/usr/bin/tini", "--", "/home/axon/.axon/dev/axon"]
