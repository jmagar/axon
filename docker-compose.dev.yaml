name: axon

# Local development/build overlay.
#
# Use with the base compose file so the runtime service keeps the same ports,
# volumes, healthcheck, dependencies, and environment, but the axon image is
# built from this checkout instead of pulled from GHCR:
#
#   docker compose -f docker-compose.yaml -f docker-compose.dev.yaml build axon
#   docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up -d axon
#
services:
  axon:
    image: axon:local
    build:
      context: .
      dockerfile: config/Dockerfile
