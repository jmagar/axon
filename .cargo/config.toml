# =============================================================================
# .cargo/config.toml — Cargo workspace configuration for axon_rust
#
# Most build settings (linker, profile tuning, jobs) live in the developer's
# ~/.cargo/config.toml. This file only adds workspace-local settings that the
# global config cannot provide.
#
# See docs/development/contributing.md for expected global config and system tool requirements.
# See https://github.com/jmagar/rmcp-template/blob/main/docs/contributing/rust.md for the
# canonical family reference.
# =============================================================================

# No rustc-wrapper. Compile caching is owned by soldr/zccache at the process
# boundary (see ~/.local/bin/cargo front door); an in-process wrapper would
# stack a second cache layer. The ~/.local/bin/axon symlink is maintained by
# scripts/axon, not by a build-time wrapper.

[env]
# Local cargo commands are test/dev oriented by default. The root build script
# still enforces real web assets when this env/config opt-in is absent.
AXON_ALLOW_FALLBACK_WEB_ASSETS = { value = "1", force = false }

[alias]
# The `cargo xtask` convention: `cargo xtask <cmd>` delegates to the xtask crate.
# See: https://github.com/matklad/cargo-xtask
xtask = "run --package xtask --"

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
