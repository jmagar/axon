# =============================================================================
# .cargo/config.toml — Cargo workspace configuration for axon_rust
#
# Most build settings (linker, profile tuning, jobs) live in the developer's
# ~/.cargo/config.toml. This file only adds workspace-local settings that the
# global config cannot provide.
#
# See docs/contributing/rust.md for expected global config and system tool requirements.
# See https://github.com/jmagar/rmcp-template/blob/main/docs/contributing/rust.md for the
# canonical family reference.
# =============================================================================

[build]
# sccache wrapper disabled for THIS repo. axon depends on sqlx, whose proc-macro
# (sqlx_macros) dynamically links libssl.so.3. sccache-dist's build-server sandbox
# contains ONLY the shipped Rust toolchain — not arbitrary system libs like
# openssl — so distributing an sqlx-using compile fails on the server with:
#   libsqlx_macros-*.so: libssl.so.3: cannot open shared object file
# Confirmed 2026-06-02 by a clean dist build (rc=101 on `sqlx`, after 629 crates
# distributed fine). This is a native-linking-proc-macro limitation of sccache-dist
# (same class as lab's boa_engine). The earlier cross-worktree cache-collision
# rationale is obsolete (path-sensitive keys) — THIS dist limitation is the live one.
# Re-enable only if dist is disabled globally or the servers can satisfy such libs.
rustc-wrapper = ""

[alias]
# The `cargo xtask` convention: `cargo xtask <cmd>` delegates to the xtask crate.
# See: https://github.com/matklad/cargo-xtask
xtask = "run --package xtask --"

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
