name: axon

# Full axon stack: axon (HTTP), qdrant, tei, chrome.
#   docker compose --env-file ~/.axon/.env up -d
# ~/.axon is the canonical host appdata root. Override AXON_HOME only when
# relocating the full Axon appdata tree to another absolute path.

x-common-service: &common-service
  networks:
    - axon
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"

services:
  axon:
    <<: *common-service
    image: axon:local
    container_name: axon
    build:
      context: .
      dockerfile: config/Dockerfile
    user: "1000:1000"
    env_file:
      - path: ${AXON_HOME:-${HOME}/.axon}/.env
        required: false
    environment:
      # Container-internal service DNS (overrides host-side values from ~/.axon/.env).
      QDRANT_URL: http://axon-qdrant:6333
      TEI_URL: http://axon-tei:80
      AXON_CHROME_REMOTE_URL: http://axon-chrome:6000
      # Bind to all interfaces inside the container; host port-publishing is
      # how external traffic reaches it. Non-loopback bind requires a token.
      AXON_MCP_HTTP_HOST: 0.0.0.0
      AXON_MCP_HTTP_PORT: "8001"
      # ~/.axon canonical layout inside the container.
      HOME: /home/axon
      AXON_HOME: /home/axon/.axon
      AXON_DATA_DIR: /home/axon/.axon
    volumes:
      # Persist config + secrets + jobs.db + output + logs + artifacts on the host.
      - ${AXON_HOME:-${HOME}/.axon}:/home/axon/.axon
      # Persist OAuth client registrations, refresh tokens, and JWT signing key
      # across container recreates so upstream gateways don't hold stale client IDs.
      - ${AXON_HOME:-${HOME}/.axon}/lab-auth:/home/axon/.lab
    ports:
      - "${AXON_MCP_HTTP_PUBLISH:-127.0.0.1:8001}:8001"
    command: ["serve"]
    depends_on:
      axon-qdrant:
        condition: service_healthy
      axon-tei:
        condition: service_healthy
      axon-chrome:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 4 http://127.0.0.1:8001/mcp -X POST -H 'Content-Type: application/json' -H 'Accept: application/json, text/event-stream' -H 'MCP-Protocol-Version: 2025-06-18' -H \"Authorization: Bearer ${AXON_MCP_HTTP_TOKEN:-}\" -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2025-06-18\",\"capabilities\":{},\"clientInfo\":{\"name\":\"docker-healthcheck\",\"version\":\"1.0\"}}}' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  axon-qdrant:
    <<: *common-service
    image: qdrant/qdrant:v1.13.1
    container_name: axon-qdrant
    ports:
      - "127.0.0.1:53333:6333"
      - "127.0.0.1:53334:6334"  # gRPC
    volumes:
      - ${AXON_HOME:-${HOME}/.axon}/qdrant:/qdrant/storage
      - ./config/qdrant/production.yaml:/qdrant/config/production.yaml:ro
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 12G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/bash",
          "-ec",
          "exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /readyz HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep -q \"200\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  axon-tei:
    <<: *common-service
    image: ghcr.io/huggingface/text-embeddings-inference:89-1.9
    container_name: axon-tei
    ports:
      - "127.0.0.1:${TEI_HTTP_PORT:-52000}:80"
    volumes:
      - ${AXON_HOME:-${HOME}/.axon}/tei:/data
    command:
      - --model-id
      - ${TEI_EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      - --dtype
      - float16
      - --max-concurrent-requests
      - "${TEI_MAX_CONCURRENT_REQUESTS:-512}"
      - --max-batch-tokens
      - "${TEI_MAX_BATCH_TOKENS:-163840}"
      - --max-batch-requests
      - "${TEI_MAX_BATCH_REQUESTS:-128}"
      - --max-client-batch-size
      - "${TEI_MAX_CLIENT_BATCH_SIZE:-96}"
      - --pooling
      - ${TEI_POOLING:-last-token}
      - --tokenization-workers
      - "${TEI_TOKENIZATION_WORKERS:-8}"
      - --auto-truncate
    environment:
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-0}"
      NVIDIA_REQUIRE_CUDA: "cuda>=12.2"
      CUDA_VISIBLE_DEVICES: "${CUDA_VISIBLE_DEVICES:-0}"
      PYTORCH_CUDA_ALLOC_CONF: max_split_size_mb:1024
      OMP_NUM_THREADS: 8
      MKL_NUM_THREADS: 8
      TOKENIZERS_PARALLELISM: "true"
      CUDA_CACHE_DISABLE: 0
      RUST_LOG: text_embeddings_router=info
      HF_HUB_CACHE: /data/cache
      HF_HUB_ENABLE_HF_TRANSFER: 1
      HF_TOKEN: ${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  axon-chrome:
    # headless_browser manager + chrome-headless-shell
    # Port 6000: management API (GET / → "healthy", /fork, /shutdown)
    # Port 9222: CDP proxy — pointed at by AXON_CHROME_REMOTE_URL
    container_name: axon-chrome
    build:
      context: ./config
      dockerfile: chrome/Dockerfile
    shm_size: "2gb"
    ports:
      - "127.0.0.1:9222:9222"  # CDP proxy
      - "127.0.0.1:9223:9223"  # raw Chrome DevTools
      - "127.0.0.1:6000:6000"  # management API
    # Security: all three Chrome ports (6000 management API, 9222 CDP proxy,
    # 9223 raw DevTools) are intentionally bound to 127.0.0.1 ONLY. The
    # upstream `headless_browser` crate and Chrome DevTools Protocol have no
    # built-in authentication — anyone who can reach these ports can drive
    # the browser arbitrarily. Do NOT change these to 0.0.0.0; cross-host
    # deployments must front Chrome with an authenticated reverse proxy or
    # tunnel. See docs/SECURITY.md §8.
    environment:
      HOSTNAME_OVERRIDE: axon-chrome
    networks:
      - axon
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL --max-time 4 http://127.0.0.1:9222/json/version > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

networks:
  axon:
    driver: bridge
    name: axon
