name: axon

# Full axon stack: axon (HTTP), tei, chrome, plus an optional qdrant service.
# Production on dookie uses Qdrant on tootie by default to keep the large vector
# working set off the dev box. Override AXON_QDRANT_URL to point elsewhere, or
# start the optional axon-qdrant service explicitly when running all infra local.
#   docker compose --env-file ~/.axon/.env -f docker-compose.prod.yaml up -d
# ~/.axon is the canonical host appdata root. Override AXON_HOME only when
# relocating the full Axon appdata tree to another absolute path.

x-common-service: &common-service
  networks:
    - axon
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"

x-gpu-service: &gpu-service
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

services:
  axon:
    <<: *common-service
    image: ${AXON_IMAGE:-ghcr.io/jmagar/axon:latest}
    container_name: axon
    user: "1000:1000"
    env_file:
      - path: ${AXON_HOME:-${HOME}/.axon}/.env
        required: false
    environment:
      # Host-bleed guards: container user is `axon` — override host paths.
      # The shared ~/.axon/.env has these set to the host's $HOME, which
      # doesn't exist inside the container. env_file values override Dockerfile
      # ENV, so we must re-override here.
      AXON_HOME: /home/axon/.axon
      AXON_DATA_DIR: /home/axon/.axon
      # Pin service URLs so the axon container does not inherit host-loopback
      # values from ~/.axon/.env. Qdrant defaults to tootie's Tailscale IP to
      # keep the memory-heavy vector store off dookie; use AXON_QDRANT_URL to
      # override, e.g. http://axon-qdrant:6333 for an all-local compose stack.
      QDRANT_URL: ${AXON_QDRANT_URL:-http://100.120.242.29:53333}
      TEI_URL: http://axon-tei:80
      AXON_CHROME_REMOTE_URL: http://axon-chrome:6000
      # AXON_SERVER_URL is a client-side switch. The shared ~/.axon/.env may
      # set it for host CLI commands, but the server container must not inherit
      # it or container-local maintenance commands will route back through HTTP.
      AXON_SERVER_URL: ""
      # Host-only bootstrap overrides must not leak from the shared env file
      # into the container and change config/env loading paths.
      AXON_ENV_FILE: ""
      AXON_CONFIG_PATH: ""
      AXON_CODEX_CMD: ""
      AXON_CODEX_HOME: ""
      TZ: ${TZ:-America/New_York}
      # Filesystem-namespace claim affinity (axon_rust-p2oc). Embed jobs whose
      # input is a local path are stamped with the enqueueing process's namespace
      # at insert time, then only claimed by workers in the same namespace. The
      # container uses "axon-container"; host CLI workers leave this unset (or
      # set it explicitly) so they only claim namespace-NULL (URL/text) jobs and
      # their own local-path jobs — never container-path jobs.
      AXON_FS_NAMESPACE: axon-container
    volumes:
      # Persist config + secrets + jobs.db + output + logs + artifacts on the host.
      - ${AXON_HOME:-${HOME}/.axon}:/home/axon/.axon
      # Persist OAuth client registrations, refresh tokens, and JWT signing key
      # across container recreates so upstream gateways don't hold stale client IDs.
      - ${AXON_HOME:-${HOME}/.axon}/lab-auth:/home/axon/.lab
      # Gemini CLI auth files — headless ask/evaluate/research synthesis reads
      # oauth_creds.json, gemini-credentials.json, google_accounts.json from here.
      # Prerequisite: run `gemini auth login` on the host before starting the container
      # so ${HOME}/.gemini exists and contains valid credentials. If the directory is
      # absent, Docker will create it as root-owned — run `mkdir -p ~/.gemini` first.
      - ${GEMINI_HOME:-${HOME}/.gemini}:/home/axon/.gemini:ro
    ports:
      - "${AXON_MCP_HTTP_PUBLISH:-8001}:8001"
    command: ["serve"]
    depends_on:
      axon-tei:
        condition: service_healthy
      axon-chrome:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 4 http://127.0.0.1:8001/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 180s

  axon-qdrant:
    <<: *common-service
    image: qdrant/qdrant:v1.13.1
    container_name: axon-qdrant
    profiles: ["local-qdrant"]
    # Shield the vector DB from the kernel's *global* OOM killer: under host
    # memory pressure (concurrent cargo builds + optimizer churn) qdrant is the
    # largest RSS on the box and got picked twice in 10 minutes (dmesg
    # CONSTRAINT_NONE — host-level, not this container's cgroup cap). Prefer
    # killing a rebuildable build process over the database.
    oom_score_adj: -500
    ports:
      - "${QDRANT_HTTP_PORT:-53333}:6333"
      - "${QDRANT_GRPC_PORT:-53334}:6334"  # gRPC
    volumes:
      - ${AXON_HOME:-${HOME}/.axon}/qdrant:/qdrant/storage
      - ./config/qdrant/production.yaml:/qdrant/config/production.yaml:ro
    deploy:
      resources:
        limits:
          # 4 cores: the 2026-06-09 always_ram→on-disk re-optimization of the
          # 4.5M-point axon collection was CPU-bound at the old lower cap
          # (collection optimizer threads raised 2→4 via live
          # PATCH the same evening — that setting persists in the collection
          # config; production.yaml's max_optimization_threads=2 remains the
          # default for new collections). Keep this <=4 so CI smoke jobs on
          # 4-core Docker runners can parse and start the compose stack.
          cpus: '4.0'
          # axon collection's resident working set (int8 quant always_ram + in-RAM
          # HNSW index) stably sits ~12.5G and was OOM-killed against a 12G cap
          # (206 restarts, dmesg CONSTRAINT_MEMCG). 16G gives ~28% headroom over
          # the stable set. To reduce real RAM instead, flip the axon collection's
          # quantization always_ram:false + hnsw on_disk:true (trades query latency).
          memory: 16G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/bash",
          "-ec",
          "exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /readyz HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep -q \"200\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  axon-tei:
    <<: [*common-service, *gpu-service]
    image: ghcr.io/huggingface/text-embeddings-inference:89-1.9
    container_name: axon-tei
    environment:
      # Container-internal path — not suitable for shared .env.
      HF_HUB_CACHE: /data/cache
      # TEI-specific filter — would suppress axon's logs if in shared .env.
      RUST_LOG: text_embeddings_router=info
    ports:
      - "${TEI_HTTP_PORT:-52000}:80"
    volumes:
      - ${AXON_HOME:-${HOME}/.axon}/tei:/data
    command:
      - --model-id
      - ${TEI_EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      - --dtype
      - float16
      - --max-concurrent-requests
      - "${TEI_MAX_CONCURRENT_REQUESTS:-32}"
      - --max-batch-tokens
      - "${TEI_MAX_BATCH_TOKENS:-65536}"
      - --max-batch-requests
      - "${TEI_MAX_BATCH_REQUESTS:-64}"
      - --max-client-batch-size
      - "${TEI_SERVER_MAX_CLIENT_BATCH_SIZE:-96}"
      - --pooling
      - ${TEI_POOLING:-last-token}
      - --tokenization-workers
      - "${TEI_TOKENIZATION_WORKERS:-8}"
      - --auto-truncate
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  axon-chrome:
    # headless_browser manager + chrome-headless-shell
    # Port 6000: management API (GET / → "healthy", /fork, /shutdown)
    # Port 9222: CDP proxy — pointed at by AXON_CHROME_REMOTE_URL
    # Security: no built-in auth on CDP/headless_browser. Keep external exposure
    # controlled at the firewall, reverse proxy, or tunnel layer. Do not add
    # host-qualified port bindings; pre-commit rejects them.
    <<: *common-service
    container_name: axon-chrome
    build:
      context: ./config
      dockerfile: chrome/Dockerfile
    shm_size: "2gb"
    ports:
      - "9222:9222"  # CDP proxy
      - "9223:9223"  # raw Chrome DevTools
      - "6000:6000"  # management API
    environment:
      HOSTNAME_OVERRIDE: axon-chrome
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL --max-time 4 http://127.0.0.1:9222/json/version > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

networks:
  axon:
    name: ${DOCKER_NETWORK:-axon}
    external: true
