# Test infrastructure — isolated Postgres + RabbitMQ for cargo test
# Usage:
#   docker compose -f docker-compose.test.yaml up -d
#   cargo test
#   docker compose -f docker-compose.test.yaml down -v   # -v wipes data between runs
#
# Required .env entries (already set):
#   AXON_TEST_PG_URL=postgresql://axon:axontest@127.0.0.1:53434/axon_test
#   AXON_TEST_AMQP_URL=amqp://axon:axontest@127.0.0.1:45536/%2f

services:
  axon-postgres-test:
    image: postgres:17-alpine
    container_name: axon-postgres-test
    ports:
      - "127.0.0.1:53434:5432"
    environment:
      POSTGRES_USER: axon
      POSTGRES_PASSWORD: axontest
      POSTGRES_DB: axon_test
    tmpfs:
      - /var/lib/postgresql/data   # ephemeral — wiped on container stop
    networks:
      - axon-test

  axon-rabbitmq-test:
    image: rabbitmq:4.0-management
    container_name: axon-rabbitmq-test
    ports:
      - "127.0.0.1:45536:5672"    # AMQP
      - "127.0.0.1:45537:15672"   # management UI
    environment:
      RABBITMQ_DEFAULT_USER: axon
      RABBITMQ_DEFAULT_PASS: axontest
    tmpfs:
      - /var/lib/rabbitmq         # ephemeral — wiped on container stop
    networks:
      - axon-test

  axon-redis-test:
    image: redis:8.2-alpine
    container_name: axon-redis-test
    ports:
      - "127.0.0.1:53380:6379"
    tmpfs:
      - /data                     # ephemeral — wiped on container stop
    networks:
      - axon-test
    # AXON_TEST_REDIS_URL=redis://127.0.0.1:53380

  axon-qdrant-test:
    image: qdrant/qdrant:v1.13.1
    container_name: axon-qdrant-test
    ports:
      - "127.0.0.1:53335:6333"
      - "127.0.0.1:53336:6334"   # gRPC
    tmpfs:
      - /qdrant/storage           # ephemeral — wiped on container stop
    networks:
      - axon-test
    # AXON_TEST_QDRANT_URL=http://127.0.0.1:53335

networks:
  axon-test:
    name: axon-test
