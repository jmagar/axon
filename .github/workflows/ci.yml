name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 3am UTC
  workflow_dispatch:
    inputs:
      run_infra_tests:
        description: "Run ignored SQLite/in-process infra smoke tests"
        required: false
        default: false
        type: boolean
      run_live_qdrant_tests:
        description: "Run live Qdrant vector integration tests"
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: ""

jobs:
  mcp-transport-modes:
    name: mcp-transport-modes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: xtask
      - name: Enforce MCP CLI transport mode support
        run: cargo xtask check-mcp-http

  no-mod-rs:
    name: no-mod-rs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: xtask
      - name: Enforce modern Rust module style (no mod.rs)
        run: cargo xtask check-no-mod-rs

  toml-fmt:
    name: toml-fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .cargo/config.toml
            .config/nextest.toml
            .taplo.toml
            config.example.toml
            deny.toml
            rust-toolchain.toml
            docs/config/env-migration-matrix.toml
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
      - uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli
      - name: taplo fmt --check
        run: |
          taplo fmt --check \
            .cargo/config.toml \
            .config/nextest.toml \
            .taplo.toml \
            config.example.toml \
            deny.toml \
            docs/config/env-migration-matrix.toml \
            rust-toolchain.toml

  lefthook-pre-commit-speed:
    name: lefthook pre-commit speed guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: enforce pre-commit stays fast
        run: python3 scripts/check_lefthook_pre_commit_speed.py

  palette-tauri:
    name: palette-tauri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Cone mode (default) so root-level files — notably the tracked
          # `.gitignore` — are checked out. Under non-cone sparse checkout the
          # root `.gitignore` is left out of the working tree, and with
          # actions/checkout's blobless partial clone cargo's gix file-walker
          # fails to build its excludes stack while fingerprinting the build
          # script ("Failed to update the excludes stack"), breaking
          # `cargo check`. The green check/clippy jobs use cone mode for the
          # same reason.
          sparse-checkout: |
            apps/palette-tauri
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/palette-tauri/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/palette-tauri/src-tauri
          shared-key: palette-tauri
      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential curl file libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev libwebkit2gtk-4.1-dev patchelf pkg-config wget
      - name: Install palette dependencies
        run: pnpm --dir apps/palette-tauri install --frozen-lockfile
      - name: Palette TypeScript contract tests
        run: pnpm --dir apps/palette-tauri test
      - name: Palette typecheck
        run: pnpm --dir apps/palette-tauri typecheck
      - name: Palette Vite build
        run: pnpm --dir apps/palette-tauri vite:build
      - name: Tauri cargo check
        run: cargo check --locked --manifest-path apps/palette-tauri/src-tauri/Cargo.toml
      - name: Tauri cargo test
        run: cargo test --locked --manifest-path apps/palette-tauri/src-tauri/Cargo.toml

  windows-check:
    name: windows-check (xtask only)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            Cargo.toml
            Cargo.lock
            .env.example
            config.example.toml
            docker-compose.prod.yaml
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo/config.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: xtask-windows
      - name: cargo check -p xtask
        run: cargo check -p xtask --locked
      - name: cargo test -p xtask
        run: cargo test -p xtask --locked
      - name: cargo xtask check-no-mod-rs
        run: cargo xtask check-no-mod-rs
      - name: cargo xtask check-mcp-http
        run: cargo xtask check-mcp-http

  windows-build:
    name: windows-build (axon.exe)
    # Cross-compiled from Linux with the mingw-w64 (x86_64-pc-windows-gnu)
    # toolchain. A previous cargo-zigbuild attempt failed because zig does not
    # bundle the Windows platform headers (sched.h / windows.h) that
    # aws-lc-sys's jitterentropy code needs; mingw-w64 ships those headers, so
    # aws-lc-sys and ring both cross-build cleanly (the resulting axon.exe was
    # smoke-tested on Windows 11: it runs, loads the full CLI, and resolves
    # native C:\ paths). Running on the Linux runner avoids the slow
    # GitHub-hosted Windows VM and its 2x minute billing. The cfg(windows)
    # AXON_DATA_DIR path-regression test is executed under wine on the same
    # target, so Windows path semantics are still covered.
    runs-on: ubuntu-latest
    env:
      CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
      CXX_x86_64_pc_windows_gnu: x86_64-w64-mingw32-g++
      AR_x86_64_pc_windows_gnu: x86_64-w64-mingw32-ar
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            Cargo.toml
            Cargo.lock
            .env.example
            config.example.toml
            docker-compose.prod.yaml
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo/config.toml
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          targets: x86_64-pc-windows-gnu
      - name: Install mingw-w64 and wine
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mingw-w64 wine64
          # The Ubuntu wine64 package's binary name varies across releases
          # (wine64 vs wine), so discover whichever exists and pin cargo's
          # target runner to its absolute path. Fail loudly if neither is found.
          wine_bin="$(command -v wine64 || command -v wine || true)"
          if [ -z "$wine_bin" ]; then
            echo "::error::no wine binary found after installing wine64"
            exit 1
          fi
          echo "using wine runner: $wine_bin"
          "$wine_bin" --version
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_RUNNER=$wine_bin" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: axon-windows-gnu
      - name: create web assets placeholder
        run: mkdir -p apps/web/out
      - name: cargo build --release -p axon (windows-gnu cross)
        run: cargo build --release --locked -p axon --target x86_64-pc-windows-gnu
      - name: Windows AXON_DATA_DIR path regression (wine)
        env:
          WINEDEBUG: "-all"
          # Headless CI: don't let wine prompt to download mono/gecko on first
          # prefix init for this console test exe.
          WINEDLLOVERRIDES: "mscoree,mshtml="
        run: cargo test --release --locked -p axon --lib --target x86_64-pc-windows-gnu axon_data_dir_accepts_windows_absolute_path
      - name: Upload axon.exe artifact
        uses: actions/upload-artifact@v5
        with:
          name: axon-windows-x86_64
          path: target/x86_64-pc-windows-gnu/release/axon.exe
          if-no-files-found: error

  shell-completions-smoke:
    name: shell-completions-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: create web assets placeholder
        run: mkdir -p apps/web/out
      - name: Build axon binary
        run: cargo build --locked --bin axon
      - name: Smoke test generated shell completions
        run: ./scripts/check_shell_completions.sh ./target/debug/axon

  mcp-schema-doc-sync:
    name: mcp-schema-doc-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Restore schema doc for drift comparison
        run: mkdir -p docs && git show HEAD:docs/MCP-TOOL-SCHEMA.md > docs/MCP-TOOL-SCHEMA.md 2>/dev/null || true
      - name: Enforce generated MCP schema docs are in sync
        run: python3 scripts/generate_mcp_schema_doc.py --check

  rest-api-parity:
    name: rest-api-parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
            Cargo.toml
            Cargo.lock
            rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rest-api-parity
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: create web assets placeholder
        run: mkdir -p apps/web/out
      - name: install web dependencies
        run: npm ci --prefix apps/web
      - name: REST route contract inventory
        run: cargo test --locked --test http_api_parity_inventory
      - name: Server-mode REST planner contract
        run: cargo test --locked server_mode_post_bodies_match_canonical_rest_contract_fields --lib
      - name: OpenAPI and generated client sync
        run: npm --prefix apps/web run openapi:check

  mcp-oauth-smoke:
    name: mcp-oauth-smoke
    runs-on: ubuntu-latest
    env:
      # TEI_URL must be set to pass startup validation even though TEI is not
      # actually running — this test exercises only the auth layer (/mcp 401).
      TEI_URL: http://127.0.0.1:52000
      QDRANT_URL: http://127.0.0.1:53333
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: create web assets placeholder
        run: mkdir -p apps/web/out
      - name: Build axon binary
        run: cargo build --locked --bin axon
      - name: OAuth protection smoke test (/mcp requires auth)
        run: ./scripts/test-mcp-oauth-protection.sh

  advisory-lock-policy:
    name: advisory-lock-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
      - name: Ban session-scoped advisory lock APIs
        run: |
          set -euo pipefail
          if rg -n "pg_advisory_lock\\s*\\(|pg_advisory_unlock\\s*\\(" src tests; then
            echo "Found banned session-scoped advisory lock usage. Use pg_advisory_xact_lock via begin_schema_migration_tx."
            exit 1
          fi
      - name: Check ensure_schema uses advisory lock
        run: |
          set -euo pipefail
          failures=()
          for file in $(rg -l 'ensure_schema' src/jobs/ 2>/dev/null || true); do
            if ! rg -q 'begin_schema_migration_tx|advisory' "$file" 2>/dev/null; then
              failures+=("$file")
            fi
          done
          if [ ${#failures[@]} -gt 0 ]; then
            echo "ERROR: The following files have ensure_schema() without advisory lock:"
            printf '  %s\n' "${failures[@]}"
            exit 1
          fi
          echo "OK: All ensure_schema() implementations use advisory lock"

  ban-skip-validation:
    name: ban-skip-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
      - name: Ban spawn_adapter_skip_validation outside tests/
        run: |
          set -euo pipefail
          # This function bypasses all adapter command validation.
          # The definition in acp.rs is allowed; calls must only exist in tests/.
          if rg -n "spawn_adapter_skip_validation" src/ --glob '*.rs' \
               --glob '!src/services/acp.rs'; then
            echo "ERROR: spawn_adapter_skip_validation called in src/ — gate it behind #[cfg(test)] or move call to tests/"
            exit 1
          fi
          echo "OK: spawn_adapter_skip_validation not called from production code paths"

  monolith:
    name: monolith
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
      - name: Enforce monolith policy (changed Rust files only)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            BASE_SHA="$PR_BASE_SHA"
          else
            BASE_SHA="$PUSH_BEFORE_SHA"
          fi

          if [[ -z "$BASE_SHA" ]] || [[ "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="$(git rev-parse HEAD^)"
          fi

          # Prefer repo-local script (always available in CI checkout)
          if [ -f "scripts/enforce_monoliths.py" ]; then
            python3 scripts/enforce_monoliths.py --base "$BASE_SHA" --head "$HEAD_SHA"
          elif [ -f "$HOME/.claude/hooks/enforce_monoliths.py" ]; then
            python3 "$HOME/.claude/hooks/enforce_monoliths.py" --base "$BASE_SHA" --head "$HEAD_SHA"
          else
            echo "ERROR: enforce_monoliths.py not found in scripts/ or ~/.claude/hooks/" && exit 1
          fi
      - name: Whole-repo monolith report (informational)
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -f "scripts/enforce_monoliths.py" ]; then
            python3 scripts/enforce_monoliths.py --whole-repo --include-allowlisted
          fi

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt check
        run: cargo fmt --all -- --check

  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: create web assets placeholder
        run: mkdir -p apps/web/out
      - name: cargo check (warnings are errors)
        env:
          RUSTFLAGS: -D warnings
        run: cargo check --workspace --all-targets --locked --features test-helpers

  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            Cargo.toml
            Cargo.lock
            .env.example
            config.example.toml
            docker-compose.prod.yaml
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo/config.toml
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: create web assets placeholder
        run: mkdir -p apps/web/out
      - name: cargo check (MSRV)
        run: cargo check --workspace --all-targets --locked --features test-helpers

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: create web assets placeholder
        run: mkdir -p apps/web/out
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked --features test-helpers -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    env:
      # Match the 8 MiB runtime thread stack from main.rs — deep scrape/extract
      # async chains overflow the 2 MiB rustc-test-harness default
      # (jobs::watch_lite::tests::lite_watch_run_now_records_completed_run).
      RUST_MIN_STACK: "8388608"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: create web assets placeholder
        run: mkdir -p apps/web/out
      - name: cargo test
        run: cargo test --workspace --locked --features test-helpers -- --skip worker_e2e

      - name: cargo test ignored cli infra tests
        run: cargo test --locked cli_ --features test-helpers -- --ignored

      - name: cargo test github integration (clone + cleanup regression)
        run: cargo test --locked --features test-helpers -- github_integration_ --ignored

      - name: ask quality regression fixtures
        run: ./scripts/test-ask-quality-regressions.sh

  test-infra:
    name: test-infra
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_infra_tests) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: run ignored SQLite/in-process worker tests
        run: cargo test --locked worker_e2e --features test-helpers -- --ignored

  live-qdrant:
    name: live-qdrant
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_live_qdrant_tests) }}
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.13.1
        ports:
          - 6333:6333
    env:
      AXON_TEST_QDRANT_URL: http://127.0.0.1:6333
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: live Qdrant vector tests
        run: cargo test --locked --features live-qdrant qdrant -- --ignored

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@7bc99eee1f1b8902a125006cf790a1f4c8461e63  # v2
        with:
          tool: cargo-audit@0.22.1,cargo-deny@0.19.0

      - name: cargo audit
        run: |
          set -euo pipefail
          echo "Running cargo audit against Cargo.lock"
          cargo audit

      - name: cargo deny check
        run: |
          set -euo pipefail
          echo "Running cargo deny check (advisories, bans, licenses, sources)"
          cargo deny check

  mcp-smoke:
    name: mcp-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            src
            xtask
            benches
            apps/web
            plugins
            docs
            .github
            tests
            scripts
            config
            vendor
            .cargo
      - name: Fetch MCP doc fixture for smoke test
        run: mkdir -p docs && git show HEAD:docs/MCP.md > docs/MCP.md

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - uses: Swatinem/rust-cache@v2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install mcporter
        run: npm install -g mcporter@0.7.3

      - name: Restore Hugging Face model cache
        uses: actions/cache@v5
        with:
          path: .cache/huggingface
          key: hf-tei-${{ runner.os }}-BAAI-bge-small-en-v1.5-v1

      - name: Cache Docker images (TEI + Qdrant)
        id: docker-cache
        uses: actions/cache@v5
        with:
          path: /tmp/docker-images
          key: docker-${{ runner.os }}-tei-cpu-v1-qdrant-1.13.1

      - name: Load Docker images from cache
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: |
          docker load -i /tmp/docker-images/tei.tar
          docker load -i /tmp/docker-images/qdrant.tar

      - name: Pull and save Docker images
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/huggingface/text-embeddings-inference:cpu-latest
          docker pull qdrant/qdrant:v1.13.1
          mkdir -p /tmp/docker-images
          docker save ghcr.io/huggingface/text-embeddings-inference:cpu-latest -o /tmp/docker-images/tei.tar
          docker save qdrant/qdrant:v1.13.1 -o /tmp/docker-images/qdrant.tar

      - name: create web assets placeholder
        run: mkdir -p apps/web/out
      - name: Build axon binary (release)
        run: cargo build --release --locked --bin axon

      - name: Write CI mcporter config
        run: |
          cat > config/mcporter.json <<EOF
          {
            "mcpServers": {
              "axon": {
                "url": "http://127.0.0.1:8001/mcp"
              }
            },
            "imports": []
          }
          EOF

      - name: Create CI env files for docker compose
        run: |
          # ~/.axon/.env — canonical compose interpolation/runtime env.
          mkdir -p "$HOME/.axon"
          {
            echo "AXON_HOME=$HOME/.axon"
            echo "AXON_DATA_DIR=$HOME/.axon"
            echo "QDRANT_URL=http://axon-qdrant:6333"
            echo "TEI_URL=http://localhost:52000"
            echo "AXON_GIT_SHA=$(git rev-parse HEAD)"
            echo "TEI_HTTP_PORT=52000"
            echo "TEI_EMBEDDING_MODEL=BAAI/bge-small-en-v1.5"
            echo "HF_TOKEN="
          } > "$HOME/.axon/.env"
          docker compose --env-file "$HOME/.axon/.env" -f docker-compose.prod.yaml config >/dev/null

      - name: Create Docker network for compose
        run: docker network create "${DOCKER_NETWORK:-axon}" || true

      - name: Start Axon infra
        run: docker compose --env-file "$HOME/.axon/.env" -f docker-compose.prod.yaml up -d axon-qdrant

      - name: Start TEI
        run: |
          mkdir -p .cache/huggingface
          docker run -d --name axon-tei -p 52000:80 \
            -v "$PWD/.cache/huggingface:/hf-cache" \
            -e HF_HOME=/hf-cache \
            -e HF_HUB_CACHE=/hf-cache/hub \
            ghcr.io/huggingface/text-embeddings-inference:cpu-latest \
            --model-id BAAI/bge-small-en-v1.5

      - name: Wait for Qdrant and TEI
        run: |
          for _ in {1..90}; do
            if curl -fsS http://127.0.0.1:53333/healthz >/dev/null 2>&1 && \
               curl -fsS http://127.0.0.1:52000/health >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for Qdrant/TEI readiness" >&2
          exit 1

      - name: Seed retrieve fixture
        env:
          AXON_DATA_DIR: .cache/axon-ci
          TEI_URL: http://127.0.0.1:52000
          QDRANT_URL: http://127.0.0.1:53333
          AXON_LOG_DIR: .cache/axon-ci/logs
          AXON_SQLITE_PATH: .cache/axon-ci/jobs.db
          AXON_EMBED_STRICT_PREDELETE: "false"
        run: ./target/release/axon embed "docs/MCP.md" --wait true --json

      - name: Start axon MCP HTTP server
        env:
          AXON_DATA_DIR: .cache/axon-ci
          TEI_URL: http://127.0.0.1:52000
          QDRANT_URL: http://127.0.0.1:53333
          AXON_LOG_DIR: .cache/axon-ci/logs
          AXON_SQLITE_PATH: .cache/axon-ci/jobs.db
        run: |
          ./target/release/axon mcp --transport http &
          echo $! > /tmp/axon-mcp.pid
          for _ in {1..30}; do
            if nc -z 127.0.0.1 8001 2>/dev/null; then
              echo "axon MCP HTTP server ready on :8001"
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for axon MCP HTTP server" >&2
          exit 1

      - name: Run MCP mcporter smoke script
        env:
          AXON_DATA_DIR: .cache/axon-ci
          TEI_URL: http://127.0.0.1:52000
          QDRANT_URL: http://127.0.0.1:53333
        run: ./scripts/test-mcp-tools-mcporter.sh

      - name: Upload mcporter logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mcp-smoke-logs
          path: .cache/mcporter-test/

      - name: Teardown infra
        if: always()
        run: |
          kill "$(cat /tmp/axon-mcp.pid 2>/dev/null)" 2>/dev/null || true
          docker rm -f axon-tei || true
          docker compose --env-file "$HOME/.axon/.env" -f docker-compose.prod.yaml down || true

  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: create web assets placeholder
        run: mkdir -p apps/web/out
      - name: cargo build release axon
        run: cargo build --release --locked --bin axon

  release-smoke:
    name: release-smoke
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: create web assets placeholder
        run: mkdir -p apps/web/out
      - name: build release binary for smoke test
        run: cargo build --release --locked --bin axon
      - name: smoke test release binary help output
        run: ./target/release/axon --help

  production-gate:
    name: production-gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - monolith
      - no-mod-rs
      - fmt
      - check
      - clippy
      - test
      - security
      - release
      - release-smoke
    steps:
      - name: verify all required jobs passed
        run: |
          test "${{ needs.monolith.result }}" = "success"
          test "${{ needs.no-mod-rs.result }}" = "success"
          test "${{ needs.fmt.result }}" = "success"
          test "${{ needs.check.result }}" = "success"
          test "${{ needs.clippy.result }}" = "success"
          test "${{ needs.test.result }}" = "success"
          test "${{ needs.security.result }}" = "success"
          test "${{ needs.release.result }}" = "success"
          test "${{ needs.release-smoke.result }}" = "success"
