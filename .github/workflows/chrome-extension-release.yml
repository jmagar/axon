name: chrome-extension-release

# Releases the Chrome extension independently of the main axon `v*` releases.
#
# Triggered by pushing a Chrome-extension tag whose version matches
# apps/chrome-extension/manifest.json, e.g.:
#
#   git tag chrome-ext-v0.1.0 && git push origin chrome-ext-v0.1.0
#
# Builds the distributable zip (real files, no symlinks), checksums it, and
# publishes a GitHub Release with the zip + SHA256 attached.
#
# Manual workflow_dispatch builds the zip and uploads it to the run as an
# artifact for inspection, but does NOT create a Release unless explicitly
# called with publish=true on a chrome-ext-v* tag. auto-tag.yml dispatches this
# workflow with publish=true after creating a new chrome-ext-v* tag, because
# tags pushed with GITHUB_TOKEN do not trigger tag-push workflows.
on:
  push:
    tags: ["chrome-ext-v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Create the GitHub Release when running on a chrome-ext-v* tag"
        type: boolean
        default: false

permissions:
  contents: write   # required to upload release artifacts

jobs:
  build:
    name: package chrome extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            apps/chrome-extension
          sparse-checkout-cone-mode: false

      - name: Build extension zip
        id: build
        run: |
          set -euo pipefail
          manifest="apps/chrome-extension/manifest.json"
          version="$(grep -m1 -E '^[[:space:]]*"version"[[:space:]]*:' "$manifest" \
            | sed -E 's/.*:[[:space:]]*"([^"]+)".*/\1/')"
          if [[ -z "$version" ]]; then
            echo "::error::could not read version from $manifest" >&2
            exit 1
          fi

          # On a real tag push, the tag version must match the manifest version
          # so a release can never ship a zip the tag disagrees with.
          if [[ "${GITHUB_REF}" == refs/tags/chrome-ext-v* ]]; then
            tag_version="${GITHUB_REF#refs/tags/chrome-ext-v}"
            if [[ "$tag_version" != "$version" ]]; then
              echo "::error::tag chrome-ext-v$tag_version does not match manifest version $version — bump $manifest before tagging" >&2
              exit 1
            fi
          fi

          ./apps/chrome-extension/package.sh
          dist="apps/chrome-extension/dist"
          name="axon-${version}.zip"
          # Checksum the bare filename (cd into dist first) so `sha256sum -c`
          # works wherever a downloader saves the zip + .sha256 side by side.
          ( cd "$dist" && sha256sum "$name" > "$name.sha256" )
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "zip=$dist/$name" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v5
        with:
          name: axon
          path: |
            apps/chrome-extension/dist/*.zip
            apps/chrome-extension/dist/*.zip.sha256
          if-no-files-found: error

      - name: Attach artifacts to release
        # Create a release on real tag pushes; workflow_dispatch is a dry-run
        # unless explicitly called with publish=true on a chrome-ext-v* tag.
        if: >-
          startsWith(github.ref, 'refs/tags/chrome-ext-v') &&
          (
            github.event_name == 'push' ||
            (github.event_name == 'workflow_dispatch' && inputs.publish)
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null
          gh release upload "$tag" \
            "${{ steps.build.outputs.zip }}" \
            "${{ steps.build.outputs.zip }}.sha256" \
            --clobber
