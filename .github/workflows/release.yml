name: release

# Triggered when you push a version tag (e.g. `git tag v2.0.0 && git push origin v2.0.0`).
# Builds the axon CLI for Linux + Windows, packages each with a SHA256 checksum,
# and publishes a GitHub Release with both artifacts attached.
#
# The Tauri axon-palette is released independently — see palette-release.yml
# (fired by `palette-v*` tags). It is no longer bundled into the axon `v*`
# release so that a palette-only change does not require a CLI version bump and
# vice-versa.
#
# Manual workflow_dispatch builds everything but skips the Release creation by
# default (artifacts are still uploaded to the workflow run for inspection).
# auto-tag.yml dispatches this workflow with publish=true after creating a new
# v* tag, because tags pushed with GITHUB_TOKEN do not trigger tag-push
# workflows.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Create the GitHub Release when running on a v* tag"
        type: boolean
        default: false

permissions:
  contents: write   # required to upload release artifacts

env:
  CARGO_TERM_COLOR: always

jobs:
  axon-linux:
    name: build axon (linux)
    runs-on: ubuntu-latest
    # The `secrets` context is NOT allowed in step-level `if:` conditionals, so
    # the optional signing secret is promoted to job-level env here (where
    # referencing `secrets` IS allowed) and the signing steps gate on
    # `env.SIGNING_KEY` instead. Empty until the key is provisioned.
    env:
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
    steps:
      # Full checkout: the non-cone sparse list previously omitted root
      # Cargo.toml/Cargo.lock, which broke every build. LFS blobs come down as
      # pointers (lfs: false default) and are not needed to build.
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-axon-linux
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: build web panel
        working-directory: apps/web
        run: npm ci && npm run build
      - name: cargo build --release --bin axon
        run: cargo build --release --locked --bin axon
      - name: Package
        run: |
          set -euo pipefail
          cd target/release
          tar -czf axon-linux-x86_64.tar.gz axon
          sha256sum axon-linux-x86_64.tar.gz > axon-linux-x86_64.tar.gz.sha256
      # OPS-H3 (bounded): artifact signing scaffold. This is a NO-OP until a
      # signing key is provisioned as the `SIGNING_KEY` repo secret. Once set,
      # it produces a detached minisign signature (`.minisig`) alongside the
      # tarball so the self-updater can verify it (see src/cli/commands/update.rs
      # `verify_optional_signature`). SHA256 alone shares one trust root with the
      # binary; a signature provides an independent one.
      # MANUAL FOLLOW-UP: provision `secrets.SIGNING_KEY` (minisign secret key)
      # and, for verification, embed/distribute the matching public key.
      - name: Sign artifact (minisign)
        if: ${{ env.SIGNING_KEY != '' }}
        run: |
          set -euo pipefail
          # Install minisign (rsign2 is a drop-in alternative if preferred).
          sudo apt-get update && sudo apt-get install -y minisign
          printf '%s' "$SIGNING_KEY" > /tmp/axon-minisign.key
          cd target/release
          echo "$SIGNING_KEY_PASSWORD" | minisign -S -s /tmp/axon-minisign.key \
            -m axon-linux-x86_64.tar.gz -x axon-linux-x86_64.tar.gz.minisig
          shred -u /tmp/axon-minisign.key
          echo "Signed axon-linux-x86_64.tar.gz -> .minisig"
      - uses: actions/upload-artifact@v5
        with:
          name: axon-linux-x86_64
          path: |
            target/release/axon-linux-x86_64.tar.gz
            target/release/axon-linux-x86_64.tar.gz.sha256
          if-no-files-found: error
      # Separate upload so the optional signature does not weaken the
      # required-file guarantee above. Only present when signing ran.
      - uses: actions/upload-artifact@v5
        if: ${{ env.SIGNING_KEY != '' }}
        with:
          name: axon-linux-x86_64-signature
          path: target/release/axon-linux-x86_64.tar.gz.minisig
          if-no-files-found: error

  axon-windows:
    name: build axon (windows)
    runs-on: windows-latest
    steps:
      # Full checkout: the non-cone sparse list previously omitted root
      # Cargo.toml/Cargo.lock, which broke every build. LFS blobs come down as
      # pointers (lfs: false default) and are not needed to build.
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-axon-windows
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: build web panel
        working-directory: apps/web
        shell: bash
        run: npm ci && npm run build
      - name: cargo build --release --bin axon
        run: cargo build --release --locked --bin axon
        env:
          # The repo's rustc-wrapper is a bash script and can't run as a Windows
          # rustc wrapper ("%1 is not a valid Win32 application", os error 193).
          # Disable it here, matching the palette-windows job.
          CARGO_BUILD_RUSTC_WRAPPER: ""
      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Push-Location target/release
          Compress-Archive -Path axon.exe -DestinationPath axon-windows-x86_64.zip -Force
          $hash = (Get-FileHash axon-windows-x86_64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  axon-windows-x86_64.zip" | Out-File -Encoding ascii axon-windows-x86_64.zip.sha256
          Pop-Location
      - uses: actions/upload-artifact@v5
        with:
          name: axon-windows-x86_64
          path: |
            target/release/axon-windows-x86_64.zip
            target/release/axon-windows-x86_64.zip.sha256
          if-no-files-found: error

  publish:
    name: publish github release
    needs: [axon-linux, axon-windows]
    runs-on: ubuntu-latest
    # Create a release on real tag pushes. workflow_dispatch remains a dry-run
    # unless explicitly called with publish=true on a v* tag (used by auto-tag).
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish)
      )
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      # OPS-H3 (bounded): attach the minisign signature to the release when it
      # exists (only after `secrets.SIGNING_KEY` is provisioned). Done as a
      # separate, non-strict step so the absence of a signature today does not
      # break the strict required-artifact release step below.
      - name: Attach signature to release (when present)
        if: ${{ hashFiles('dist/axon-linux-x86_64.tar.gz.minisig') != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null
          gh release upload "$tag" dist/axon-linux-x86_64.tar.gz.minisig --clobber
      - name: Attach artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null
          gh release upload "$tag" \
            dist/axon-linux-x86_64.tar.gz \
            dist/axon-linux-x86_64.tar.gz.sha256 \
            dist/axon-windows-x86_64.zip \
            dist/axon-windows-x86_64.zip.sha256 \
            --clobber
