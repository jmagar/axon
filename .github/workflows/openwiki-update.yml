name: OpenWiki Update

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Optional note for this manual run"
        required: false
        type: string
  repository_dispatch:
    types: [openwiki-update]
  schedule:
    # UTC; 08:00 UTC = midnight PST.
    - cron: '0 8 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenWiki
        run: npm install --global openwiki

      - name: Run OpenWiki
        run: openwiki --update --print
        env:
          OPENWIKI_PROVIDER: ${{ secrets.OPENWIKI_PROVIDER }}
          OPENWIKI_MODEL_ID: ${{ secrets.OPENWIKI_MODEL_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.OPENWIKI_ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.OPENWIKI_ANTHROPIC_BASE_URL }}
          LANGSMITH_API_KEY: ${{ secrets.OPENWIKI_LANGSMITH_API_KEY }}
          LANGCHAIN_PROJECT: openwiki
          LANGCHAIN_TRACING_V2: "true"

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            openwiki
          branch: openwiki/update
          title: docs: update OpenWiki
          commit-message: docs: update OpenWiki
          body: |
            Automated OpenWiki documentation update.
            This PR was generated by the scheduled OpenWiki workflow.
