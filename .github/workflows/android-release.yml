name: android-release

# Releases the Axon Android APK independently of the main axon `v*` releases.
#
# Run by release-please after it creates an Android-specific tag whose version
# matches the `versionName` in apps/android/app/build.gradle.kts.
# Builds the release APK, signs it (zipalign + apksigner), checksums it, and
# publishes a GitHub Release with the APK + SHA256 attached.
#
# Manual workflow_dispatch builds + signs the APK and uploads it to the run as
# an artifact for inspection, but does NOT create a Release unless explicitly
# called with publish=true on an android-v* tag. release-please.yml dispatches
# this workflow after release-please creates the GitHub Release.
#
# ---------------------------------------------------------------------------
# Required configuration (Settings → Secrets and variables → Actions)
# ---------------------------------------------------------------------------
# Signing (release-keystore secrets). When ALL four are present the APK is
# signed and verified. Publishing a GitHub Release requires all four secrets;
# manual dry-runs may still produce a clearly named `*-unsigned.apk` artifact
# for inspection.
#   ANDROID_KEYSTORE_BASE64   base64 of the release keystore (.jks/.keystore)
#                             e.g. `base64 -w0 release.jks`
#   ANDROID_KEYSTORE_PASSWORD keystore (store) password
#   ANDROID_KEY_ALIAS         signing key alias
#   ANDROID_KEY_PASSWORD      signing key password
#
# Aurora design system. The app depends on `tv.tootie.aurora:aurora`
# via a local Gradle composite build (settings.gradle.kts), NOT from Maven. To
# build it in CI, set the repository variable AURORA_REPO to the Aurora repo
# (`owner/name`); the workflow checks it out and points the build at it via
# AXON_AURORA_ANDROID_PATH. Optionally set AURORA_REF for a pinned branch/tag.
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Attach artifacts to an existing release-please android-v* release"
        type: boolean
        default: false

permissions:
  contents: read

env:
  AURORA_REPO: ${{ vars.AURORA_REPO || 'jmagar/aurora-design-system' }}
  AURORA_REF: ${{ vars.AURORA_REF || '8748eb6434b3bbe4c75f25bfff71950b7efc051b' }}

jobs:
  build:
    name: build android apk
    runs-on: ubuntu-latest
    # Only this job publishes release artifacts; scope contents: write here rather than
    # granting it workflow-wide to every step (build/sign included).
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      # Aurora composite checkout (see header). Lands a sibling checkout
      # alongside the repo and exports its android/ path for Gradle.
      - name: Checkout Aurora design system
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          repository: ${{ env.AURORA_REPO }}
          ref: ${{ env.AURORA_REF }}
          path: .aurora-design-system
          token: ${{ secrets.AURORA_TOKEN || github.token }}

      - name: Export Aurora path
        # Use the built-in $GITHUB_WORKSPACE env var rather than a ${{ }} template
        # expansion inside the run script (avoids the template-injection lint).
        run: echo "AXON_AURORA_ANDROID_PATH=$GITHUB_WORKSPACE/.aurora-design-system/android" >> "$GITHUB_ENV"

      - name: Set up pnpm for Aurora token generation
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node for Aurora token generation
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          cache: pnpm
          cache-dependency-path: .aurora-design-system/pnpm-lock.yaml

      - name: Install Aurora token dependencies
        working-directory: .aurora-design-system
        run: pnpm install --frozen-lockfile

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve and validate version
        id: version
        run: |
          set -euo pipefail
          gradle="apps/android/app/build.gradle.kts"
          version="$(grep -m1 -E '^[[:space:]]*versionName[[:space:]]*=' "$gradle" \
            | sed -E 's/.*"([^"]+)".*/\1/')"
          if [[ -z "$version" ]]; then
            echo "::error::could not read versionName from $gradle" >&2
            exit 1
          fi

          # On a real tag push, the tag version must match versionName so a
          # release can never ship an APK the tag disagrees with.
          if [[ "${GITHUB_REF}" == refs/tags/android-v* ]]; then
            tag_version="${GITHUB_REF#refs/tags/android-v}"
            if [[ "$tag_version" != "$version" ]]; then
              echo "::error::tag android-v$tag_version does not match versionName $version — bump $gradle before tagging" >&2
              exit 1
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Assemble release APK
        run: apps/android/gradlew -p apps/android :app:assembleRelease --no-daemon --stacktrace

      - name: Sign and package APK
        id: package
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PUBLISH_REQUESTED: >-
            ${{
              startsWith(github.ref, 'refs/tags/android-v') &&
              github.event_name == 'workflow_dispatch' &&
              inputs.publish
            }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          dist="apps/android/app/build/outputs/apk/release"
          unsigned="$dist/app-release-unsigned.apk"
          if [[ ! -f "$unsigned" ]]; then
            # Some AGP configs emit app-release.apk even without a signingConfig.
            unsigned="$dist/app-release.apk"
          fi
          if [[ ! -f "$unsigned" ]]; then
            echo "::error::release APK not found in $dist" >&2
            find "$dist" -maxdepth 1 -print || true
            exit 1
          fi

          # Pick the newest installed build-tools for zipalign/apksigner.
          sdk="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          bt="$(find "$sdk/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n1)"
          echo "Using build-tools at $bt"

          mkdir -p bin
          signing_ready=false
          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" \
                && -n "${ANDROID_KEYSTORE_PASSWORD:-}" \
                && -n "${ANDROID_KEY_ALIAS:-}" \
                && -n "${ANDROID_KEY_PASSWORD:-}" ]]; then
            signing_ready=true
          fi

          if [[ "$PUBLISH_REQUESTED" == "true" && "$signing_ready" != "true" ]]; then
            echo "::error::Android release publishing requires ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD" >&2
            exit 1
          fi

          out="bin/axon-android-${version}.apk"
          if [[ "$signing_ready" == "true" ]]; then
            echo "Signing release APK"
            ks="$RUNNER_TEMP/release-keystore.jks"
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$ks"
            aligned="$RUNNER_TEMP/aligned.apk"
            "$bt/zipalign" -p -f 4 "$unsigned" "$aligned"
            "$bt/apksigner" sign \
              --ks "$ks" \
              --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
              --ks-key-alias "$ANDROID_KEY_ALIAS" \
              --key-pass "pass:$ANDROID_KEY_PASSWORD" \
              --out "$out" "$aligned"
            "$bt/apksigner" verify --verbose "$out"
            rm -f "$ks"
            signed=true
          else
            echo "::warning::no signing secrets configured — shipping UNSIGNED APK (cannot be installed until signed)"
            out="bin/axon-android-${version}-unsigned.apk"
            "$bt/zipalign" -p -f 4 "$unsigned" "$out"
            signed=false
          fi

          sha256sum "$out" > "$out.sha256"
          echo "apk=$out" >> "$GITHUB_OUTPUT"
          echo "signed=$signed" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v5
        with:
          name: axon-android
          path: |
            ${{ steps.package.outputs.apk }}
            ${{ steps.package.outputs.apk }}.sha256
          if-no-files-found: error

      - name: Attach artifacts to release
        # Attach artifacts only when release-please dispatches this workflow on
        # an existing android-v* release tag.
        if: >-
          startsWith(github.ref, 'refs/tags/android-v') &&
          github.event_name == 'workflow_dispatch' &&
          inputs.publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null
          gh release upload "$tag" \
            "${{ steps.package.outputs.apk }}" \
            "${{ steps.package.outputs.apk }}.sha256" \
            --clobber
