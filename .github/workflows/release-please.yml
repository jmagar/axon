name: release-please

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please-main
  cancel-in-progress: false

env:
  # Self-hosted Rust jobs build through soldr/zccache (setup-rust-soldr);
  # incremental must be off under a compile wrapper.
  CARGO_INCREMENTAL: "0"
  SOLDR_CACHE_DIR: ${{ github.workspace }}/../.soldr-cache

jobs:
  release-please:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, unraid]
    permissions:
      contents: write       # required to create release commits and tags
      issues: write         # required for release-please labels
      pull-requests: write  # required to create and update release PRs
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      prs: ${{ steps.release.outputs.prs }}
      palette_tag: ${{ steps.release.outputs['apps/palette-tauri--tag_name'] }}
      android_tag: ${{ steps.release.outputs['apps/android--tag_name'] }}
      chrome_tag: ${{ steps.release.outputs['apps/chrome-extension--tag_name'] }}
    steps:
      - name: Require release-please token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: test -n "$RELEASE_PLEASE_TOKEN"
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-pr-fixups:
    needs: release-please
    # release-please may update already-open release PRs without setting
    # prs_created=true. Run fixups for any PR payload it returns so component
    # source version files cannot drift behind the manifest/changelog bump.
    if: ${{ needs.release-please.outputs.prs != '' && needs.release-please.outputs.prs != '[]' && needs.release-please.outputs.prs != 'null' }}
    runs-on: [self-hosted, unraid]
    permissions:
      contents: write  # required to push generated fixup commits to release PR branches
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - uses: ./.github/actions/setup-rust-soldr
      - name: Apply release PR fixups
        env:
          PRS: ${{ needs.release-please.outputs.prs }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          base_ref="$(git rev-parse --abbrev-ref HEAD)"
          jq -c '.[]' <<<"$PRS" | while read -r pr; do
            branch="$(jq -r '.headBranchName' <<<"$pr")"
            files="$(jq -r '.files[]?' <<<"$pr")"
            git fetch origin "$branch"
            git checkout "$branch"
            cargo xtask release-please-fixup-plan --files "$files" --json > fixup-plan.json
            while read -r fixup; do
              component="$(jq -r '.id' <<<"$fixup")"
              version="$(jq -r '.version' <<<"$fixup")"
              cargo xtask release-please-fixups --component "$component" --version "$version"
            done < <(jq -c '.[]' fixup-plan.json)
            cargo xtask check-release-versions --base origin/main --head HEAD --mode pr
            if ! git diff --quiet; then
              git add --update
              git commit -m "chore: apply release-please fixups"
              git push origin HEAD:"$branch"
            fi
            git checkout "$base_ref"
          done

  dispatch-artifacts:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: [self-hosted, unraid]
    permissions:
      contents: read
      actions: write  # required to dispatch artifact workflows
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust-soldr
      - name: Build dispatch plan
        env:
          RELEASE_OUTPUTS: ${{ toJson(needs.release-please.outputs) }}
        run: |
          cargo xtask release-please-dispatch-plan \
            --release-outputs "$RELEASE_OUTPUTS" \
            --json > dispatch-plan.json
          jq . dispatch-plan.json
      - name: Dispatch artifact workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          jq -c '.[]' dispatch-plan.json | while read -r item; do
            workflow="$(jq -r '.workflow' <<<"$item")"
            tag="$(jq -r '.tag' <<<"$item")"
            git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null
            gh workflow run "$workflow" --ref "$tag" -f publish=true
          done
