name: desktop

on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # apps/desktop is its own workspace (see apps/desktop/Cargo.toml).
  CARGO_MANIFEST_PATH: apps/desktop/Cargo.toml

jobs:
  build-linux:
    name: build (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop
          shared-key: axon-palette-ubuntu-latest

      # GPUI on Linux links against X11 + Wayland + xcb headers.
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libssl-dev libfontconfig1-dev \
            libxcb-randr0-dev libxcb-xkb-dev libxcb-cursor-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxcb-keysyms1-dev libxcb-image0-dev

      - name: cargo build --release
        run: cargo build --release --locked --manifest-path apps/desktop/Cargo.toml

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: axon-palette-linux-x86_64
          path: apps/desktop/target/release/axon-palette
          if-no-files-found: error

  build-windows:
    name: build (windows, self-hosted)
    # Self-hosted runner: only run on pushes to this repo and PRs from same-repo
    # branches. Fork PRs fall through (no Windows artifact for them), so a
    # malicious fork can't execute on the self-hosted box even if approved.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop
          shared-key: axon-palette-windows

      - name: cargo build --release
        run: cargo build --release --locked --manifest-path apps/desktop/Cargo.toml

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: axon-palette-windows-x86_64
          path: apps/desktop/target/release/axon-palette.exe
          if-no-files-found: error
