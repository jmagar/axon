name: Compose smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compose-config:
    name: compose-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate production compose
        run: docker compose --env-file .env.example -f docker-compose.yaml config --quiet

      - name: Validate development compose override
        run: docker compose --env-file .env.example -f docker-compose.yaml -f docker-compose.dev.yaml config --quiet

  image-build-smoke:
    name: image-build-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build Axon image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: config/Dockerfile
          push: false
          tags: axon:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
