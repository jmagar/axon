name: Compose smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      compose: ${{ steps.classify.outputs.compose }}
      docker: ${{ steps.classify.outputs.docker }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Prepare trusted changed path classifier
        run: |
          set -euo pipefail
          classifier="scripts/ci/changed_paths.py"
          trusted="/tmp/axon-changed-paths.py"
          if [[ "${{ github.event_name }}" != "pull_request" ]] \
            || ! git show "${{ github.event.pull_request.base.sha }}:$classifier" > "$trusted" 2>/dev/null; then
            cp "$classifier" "$trusted"
          fi
          chmod +x "$trusted"
          echo "AXON_CHANGED_PATHS=$trusted" >> "$GITHUB_ENV"
      - name: Classify changed paths
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: python3 "$AXON_CHANGED_PATHS" --event "$EVENT_NAME" --output "$GITHUB_OUTPUT" --write-changed-files changed-files.txt

  compose-config:
    name: compose-config
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.compose == 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          sparse-checkout: |
            config
            apps/web
            scripts

      # Docker Compose v5 validates external networks exist even during config --quiet.
      # Create the network so both prod and dev compose files pass static validation.
      - name: Create Docker network
        run: docker network create "${DOCKER_NETWORK:-axon}" || true

      - name: Validate production compose
        run: docker compose --env-file .env.example -f docker-compose.prod.yaml config --quiet

      - name: Validate development compose
        run: docker compose --env-file .env.example -f docker-compose.yaml config --quiet

      - name: Validate llama.cpp compose
        run: docker compose -f docker-compose.llama.yaml config --quiet

      - name: Validate helper shell scripts
        run: |
          bash -n scripts/build-on-steamy.sh scripts/test-ask-gemma4.sh scripts/test-build-on-steamy-safety.sh
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck scripts/build-on-steamy.sh scripts/test-ask-gemma4.sh scripts/test-build-on-steamy-safety.sh
          else
            echo "shellcheck not found; skipped optional shell lint" >&2
          fi
          scripts/test-build-on-steamy-safety.sh

  image-build-smoke:
    name: image-build-smoke
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.docker == 'true' }}
    steps:
      # Full checkout: Dockerfile runs cargo build inside the container,
      # so the entire source tree must be in the Docker build context.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build Axon image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: config/Dockerfile
          push: false
          tags: axon:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-smoke-gate:
    name: compose-smoke-gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - compose-config
      - image-build-smoke
    steps:
      - name: verify compose smoke jobs passed or were intentionally skipped
        run: |
          set -euo pipefail
          require_success_or_skipped() {
            local name="$1"
            local result="$2"
            case "$result" in
              success|skipped) printf '%s=%s\n' "$name" "$result" ;;
              *) echo "::error::$name concluded $result" >&2; exit 1 ;;
            esac
          }
          require_success_or_skipped changes "${{ needs.changes.result }}"
          require_success_or_skipped compose-config "${{ needs.compose-config.result }}"
          require_success_or_skipped image-build-smoke "${{ needs.image-build-smoke.result }}"
