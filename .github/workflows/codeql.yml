name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "31 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  AURORA_REPO: ${{ vars.AURORA_REPO || 'jmagar/aurora-design-system' }}
  AURORA_REF: ${{ vars.AURORA_REF || '8748eb6434b3bbe4c75f25bfff71950b7efc051b' }}

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Resolve changed files
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA" > changed-files.txt
          elif [[ "$EVENT_NAME" == "push" ]]; then
            git diff --name-only "$PUSH_BEFORE_SHA" "$HEAD_SHA" > changed-files.txt
          else
            : > changed-files.txt
          fi
          cat changed-files.txt
      - name: Classify changed paths
        id: classify
        run: python3 scripts/ci/changed_paths.py --event "${{ github.event_name }}" --changed-files changed-files.txt --output changed-paths.out
      - name: Build CodeQL matrix
        id: matrix
        run: |
          set -euo pipefail
          source changed-paths.out
          jq -nc \
            --arg actions "$codeql_actions" \
            --arg js "$codeql_javascript_typescript" \
            --arg py "$codeql_python" \
            --arg rust "$codeql_rust" \
            --arg kotlin "$codeql_java_kotlin" \
            '{
              include:
                ([]
                + (if $actions == "true" then [{language:"actions", build_mode:"none"}] else [] end)
                + (if $js == "true" then [{language:"javascript-typescript", build_mode:"none"}] else [] end)
                + (if $py == "true" then [{language:"python", build_mode:"none"}] else [] end)
                + (if $rust == "true" then [{language:"rust", build_mode:"none"}] else [] end)
                + (if $kotlin == "true" then [{language:"java-kotlin", build_mode:"manual"}] else [] end))
            }' > matrix.json
          if [[ "$(jq '.include | length' matrix.json)" == "0" ]]; then
            jq -nc '{include: [{language:"actions", build_mode:"none"}]}' > matrix.json
          fi
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"
          cat matrix.json

  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    needs: [changes]
    permissions:
      security-events: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Checkout Aurora design system
        if: matrix.language == 'java-kotlin'
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          repository: ${{ env.AURORA_REPO }}
          ref: ${{ env.AURORA_REF }}
          path: .aurora-design-system
          token: ${{ secrets.AURORA_TOKEN || github.token }}

      - name: Export Aurora path
        if: matrix.language == 'java-kotlin'
        run: echo "AXON_AURORA_ANDROID_PATH=$GITHUB_WORKSPACE/.aurora-design-system/android" >> "$GITHUB_ENV"

      - name: Set up pnpm for Aurora token generation
        if: matrix.language == 'java-kotlin'
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node for Aurora token generation
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          cache: pnpm
          cache-dependency-path: .aurora-design-system/pnpm-lock.yaml

      - name: Install Aurora token dependencies
        if: matrix.language == 'java-kotlin'
        working-directory: .aurora-design-system
        run: pnpm install --frozen-lockfile

      - name: Set up JDK 17
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        if: matrix.language == 'java-kotlin'
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        if: matrix.language == 'java-kotlin'
        uses: android-actions/setup-android@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build_mode }}
          dependency-caching: true

      - name: Build Android app for Java/Kotlin analysis
        if: matrix.language == 'java-kotlin'
        run: apps/android/gradlew -p apps/android :app:compileDebugKotlin --no-daemon --stacktrace

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
