[package]
name = "axon-palette-tauri"
version = "5.9.1"
description = "Tauri command palette for the Axon REST API"
edition = "2024"
rust-version = "1.94.0"
license = "MIT"
publish = false

[workspace]

[lib]
name = "axon_palette_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "axon-palette-tauri"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
anyhow = "1"
base64 = "0.22"
dirs = "6"
futures-util = "0.3"
percent-encoding = "2"
reqwest = { version = "0.12", default-features = false, features = [
  "json",
  "rustls-tls",
  "stream",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = ["image-png", "tray-icon"] }
tauri-plugin-global-shortcut = "2"
tokio = { version = "1", features = ["sync"] }
toml_edit = "0.23"
url = "2"
uuid = "1"
