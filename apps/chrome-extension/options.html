<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Axon Extension Settings</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body class="surface-options">
    <main>
      <header class="app-header">
        <div class="brand-heading">
          <img class="brand-mark" src="assets/axon-glyph.svg" alt="" aria-hidden="true">
          <div>
            <p class="eyebrow">Axon extension</p>
            <h1>Settings</h1>
          </div>
        </div>
        <span id="api-status" class="header-badge tone-neutral">Ready</span>
      </header>
      <section class="config-panel compact-panel" aria-labelledby="config-title">
        <div class="panel-heading">
          <h2 id="config-title">Connection</h2>
          <button id="check-api" class="link-button" type="button">Check API</button>
        </div>
        <div class="field">
          <label for="axon-url">Axon server</label>
          <input id="axon-url" type="url" value="http://100.88.16.79:8001">
        </div>
        <div class="field">
          <label for="axon-token">Token</label>
          <input id="axon-token" type="password" placeholder="Bearer token">
        </div>
        <div class="options-actions">
          <button id="save-options" class="command-button command-primary" type="button">
            <span class="command-title">Save settings</span>
            <span class="command-meta">Stored in Chrome</span>
          </button>
        </div>
      </section>
      <section class="config-panel compact-panel" aria-labelledby="automation-title">
        <div class="panel-heading">
          <div>
            <h2 id="automation-title">Automation</h2>
            <p class="panel-subtitle">Background scraping for normal web pages you browse.</p>
          </div>
        </div>
        <label class="toggle-row" for="auto-scrape-enabled">
          <input id="auto-scrape-enabled" type="checkbox">
          <span>
            <span class="toggle-title">Auto-scrape visited pages</span>
            <span class="toggle-copy">Sends each completed http(s) navigation to Axon `/v1/sources`, at most once per URL every 24 hours.</span>
          </span>
        </label>
      </section>
      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
