[package]
name = "lab-auth"
description = "Parameterizable OAuth 2.0 + JWT auth crate (axum) for lab and other consumers."
version = "0.1.0"
edition = "2024"
rust-version = "1.85.0"
license = "MIT"
publish = false

[features]
# Explicit empty default to keep Cargo feature unification a no-op for downstream consumers.
default = []

[dependencies]
axum = { version = "0.8", features = ["macros"] }
base64 = "0.22"
getrandom = "0.4"
httpdate = "1"
jsonwebtoken = { version = "10", features = ["rust_crypto"] }
reqwest = { version = "0.13", features = ["json", "rustls"] }
rsa = "0.10.0-rc.16"
# Use rusqlite 0.32 which needs libsqlite3-sys 0.30 — same as sqlx-sqlite 0.8
# (sqlx-sqlite 0.8 pins libsqlite3-sys = "0.30.1"). Using 0.39 here would pull
# in libsqlite3-sys 0.37 which conflicts because both declare links = "sqlite3".
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
subtle = "2"
thiserror = "2"
tokio = { version = "1", features = ["sync", "rt", "fs"] }
tower = { version = "0.5", features = ["util"] }
tracing = "0.1"
url = "2"

[dev-dependencies]
rand = "0.9"
tempfile = "3"
tracing-subscriber = { version = "0.3" }
wiremock = "0.6"
