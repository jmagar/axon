# GPU override for NVIDIA hosts.
#
# Apply on top of docker-compose.services.yaml to enable GPU acceleration
# for axon-tei and axon-ollama:
#
#   docker compose -f docker-compose.services.yaml -f docker-compose.gpu.yaml up -d
#
# Requires the NVIDIA Container Toolkit (nvidia-container-toolkit) and a
# working `nvidia-smi` on the host. CPU-only hosts should omit this file.

services:
  axon-tei:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  axon-ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
