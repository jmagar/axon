name: llama-cpp

# Standalone llama.cpp server for a 26B-A4B / active-4B MoE GGUF model.
#
# Target:
#   12 GB VRAM cards where llama.cpp should fit model placement, KV cache, and
#   context to device memory. The model file can live on NVMe, but good
#   generation performance requires enough system RAM to avoid active swap.
#
# Network:
#   This compose file joins the external ${DOCKER_NETWORK:-axon} network.
#   Start the main Axon stack first, or create it once with:
#     docker network create ${DOCKER_NETWORK:-axon}
#
# Start:
#   docker compose -f docker-compose.llama.yaml up -d
#
# API:
#   http://127.0.0.1:${LLAMA_CPP_PORT:-8080}/v1
#
# Defaults:
#   - Pull a GGUF quant from Hugging Face via llama.cpp's -hf loader.
#   - Use llama.cpp --fit so it can choose model placement for the target ctx.
#   - Use q8_0 KV cache and flash attention to reduce VRAM pressure.
#
# Override examples:
#   LLAMA_CPP_HF_MODEL=ggml-org/gemma-4-26B-A4B-it-GGUF:Q4_K_M
#   LLAMA_CPP_MODEL_PATH=/models/model.gguf  # then edit command from -hf to -m

x-common-service: &common-service
  networks:
    - axon
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
    memlock:
      soft: -1
      hard: -1
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"

x-gpu-service: &gpu-service
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

services:
  llama-cpp:
    <<: [*common-service, *gpu-service]
    image: ${LLAMA_CPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    container_name: llama-cpp
    environment:
      TZ: ${TZ:-America/New_York}
      LLAMA_CACHE: /root/.cache/llama.cpp
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ${AXON_HOME:-${HOME}/.axon}/llama-cpp/cache:/root/.cache/llama.cpp
      - ${AXON_HOME:-${HOME}/.axon}/llama-cpp/models:/models
    ports:
      - "${LLAMA_CPP_PORT:-8080}:8080"
    command:
      - -hf
      - ${LLAMA_CPP_HF_MODEL:-ggml-org/gemma-4-26B-A4B-it-GGUF:Q4_K_M}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "${LLAMA_CPP_CTX_SIZE:-131072}"
      - --fit
      - "${LLAMA_CPP_FIT:-on}"
      - --fit-ctx
      - "${LLAMA_CPP_FIT_CTX:-131072}"
      - --fit-target
      - "${LLAMA_CPP_FIT_TARGET:-512}"
      - --n-cpu-moe
      - "${LLAMA_CPP_N_CPU_MOE:-20}"
      - --no-mmap
      - --mlock
      - --flash-attn
      - "on"
      - --kv-unified
      - --ctx-checkpoints
      - "${LLAMA_CPP_CTX_CHECKPOINTS:-4}"
      - --cache-ram
      - "${LLAMA_CPP_CACHE_RAM:-2048}"
      - --jinja
      - --no-mmproj
      - --reasoning
      - "off"
      - --cache-type-k
      - "${LLAMA_CPP_CACHE_TYPE_K:-q8_0}"
      - --cache-type-v
      - "${LLAMA_CPP_CACHE_TYPE_V:-q8_0}"
      - --batch-size
      - "${LLAMA_CPP_BATCH_SIZE:-1024}"
      - --ubatch-size
      - "${LLAMA_CPP_UBATCH_SIZE:-512}"
      - --parallel
      - "${LLAMA_CPP_PARALLEL:-1}"
      - --threads
      - "${LLAMA_CPP_THREADS:-10}"
      - --threads-batch
      - "${LLAMA_CPP_THREADS_BATCH:-12}"
      - --no-warmup
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 4 http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 180s

networks:
  axon:
    name: ${DOCKER_NETWORK:-axon}
    external: true
