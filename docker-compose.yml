services:
  axon-mcp:
    build:
      context: .
      dockerfile: config/Dockerfile
    container_name: axon-mcp
    restart: unless-stopped
    command: ["serve", "mcp"]
    env_file:
      - path: ~/.claude-homelab/.env
        required: false
      - path: .env
        required: false
    environment:
      # Override host-side URLs with docker-internal service DNS.
      QDRANT_URL: http://axon-qdrant:6333
      TEI_URL: http://axon-tei:80
      AXON_CHROME_REMOTE_URL: http://axon-chrome:6000
      AXON_MCP_HTTP_HOST: "0.0.0.0"
      AXON_MCP_HTTP_PORT: "${AXON_MCP_HTTP_PORT:-8001}"
    ports:
      - "127.0.0.1:${AXON_MCP_HTTP_PORT:-8001}:8001/tcp"
    networks:
      - axon

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

networks:
  axon:
    name: axon
    external: true
