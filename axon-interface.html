<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axon - Neural RAG Pipeline</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #030712;
            color: #e8f4f8;
            overflow-x: hidden;
        }

        /* Neural Network Background */
        #neural-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.75;
            transition: opacity 0.5s ease;
        }

        /* Logo — fixed top-left */
        .logo {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 10;
            font-size: 16px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff87af 0%, #afd7ff 50%, #8787af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 6px;
            font-family: 'DM Sans', sans-serif;
            user-select: none;
        }

        /* Main Container — card centered via top padding, animates up on execute */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1060px;
            margin: 0 auto;
            padding: 40vh 20px 40px 20px;
            transition: padding-top 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .container.has-results {
            padding-top: 56px;
        }

        /* Interface Card */
        .interface-card {
            background: rgba(15, 23, 42, 0.08);
            backdrop-filter: none;
            border: 1px solid rgba(175, 215, 255, 0.12);
            border-radius: 16px;
            padding: 20px;
            box-shadow:
                0 0 60px rgba(175, 215, 255, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
        }

        /* ── Omnibox ── */
        .omnibox {
            display: flex;
            align-items: center;
            background: rgba(10, 18, 35, 0.65);
            border: 1.5px solid rgba(175, 215, 255, 0.18);
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
        }

        .omnibox:focus-within {
            border-color: rgba(175, 215, 255, 0.4);
            background: rgba(10, 18, 35, 0.75);
            box-shadow: 0 0 0 3px rgba(175, 215, 255, 0.08);
        }

        .omnibox .url-input {
            flex: 1;
            padding: 14px 16px;
            background: transparent;
            border: none;
            color: #e8f4f8;
            font-size: 14px;
            font-family: 'DM Mono', monospace;
            outline: none;
            min-width: 0;
        }

        .omnibox .url-input::placeholder {
            color: #475569;
            font-weight: 400;
        }

        /* Inline status — lives between input and action button */
        .omnibox-status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            flex-shrink: 0;
            max-width: 0;
            opacity: 0;
            overflow: hidden;
            white-space: nowrap;
            transition: max-width 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.3s ease,
                        padding 0.3s ease;
        }

        .omnibox-status.visible {
            max-width: 320px;
            opacity: 1;
            padding: 0 10px;
        }

        .omnibox-status .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .omnibox-status .status-dot.processing {
            background: #ff87af;
            box-shadow: 0 0 8px rgba(255, 135, 175, 0.7);
            animation: pulse-dot 1s ease-in-out infinite;
        }

        .omnibox-status .status-dot.done {
            background: #afd7ff;
            box-shadow: 0 0 6px rgba(175, 215, 255, 0.5);
        }

        .omnibox-status-text {
            font-size: 10px;
            font-family: 'DM Mono', monospace;
            color: #8787af;
            letter-spacing: 0.3px;
        }

        .omnibox-status-text span {
            color: #afd7ff;
        }

        /* Divider */
        .omnibox-divider {
            width: 1px;
            height: 22px;
            background: rgba(175, 215, 255, 0.12);
            flex-shrink: 0;
        }

        /* ── Action button: [icon LABEL] | [→] ── */
        /* Left zone: click = execute. Shows mode icon + label. */
        .action-label {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 10px 10px 12px;
            background: transparent;
            border: none;
            color: #afd7ff;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .action-label:hover {
            color: #fff;
        }

        .action-label .mode-icon {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* Right zone: click = toggle dropdown. Arrow points → or ↓. */
        .action-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 12px 10px 6px;
            background: transparent;
            border: none;
            border-radius: 0 10px 10px 0;
            color: #8787af;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .action-arrow:hover {
            color: #afd7ff;
        }

        .action-arrow svg {
            width: 14px;
            height: 14px;
            transition: transform 0.25s ease;
        }

        /* Arrow rotates down when dropdown is open */
        .omnibox.dropdown-open .action-arrow svg {
            transform: rotate(90deg);
        }

        /* ── Dropdown menu ── */
        .mode-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            left: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(175, 215, 255, 0.15);
            border-radius: 12px;
            padding: 6px;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-4px);
            transition: all 0.2s ease;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 2px;
            box-shadow:
                0 16px 48px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(175, 215, 255, 0.08);
        }

        .omnibox.dropdown-open .mode-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .mode-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: #8787af;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.15s ease;
            text-align: left;
        }

        .mode-option:hover {
            background: rgba(175, 215, 255, 0.1);
            color: #afd7ff;
        }

        .mode-option.active {
            background: rgba(255, 135, 175, 0.12);
            color: #ff87af;
        }

        .mode-option .option-icon {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* ── Results panel — collapsed by default, expands on execute ── */
        .results-panel {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.4s ease,
                        margin 0.4s ease;
            margin-top: 0;
        }

        .results-panel.expanded {
            max-height: 90vh;
            opacity: 1;
            margin-top: 16px;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Results header — tabs float right ── */
        .results-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 10px;
        }

        /* ── Result tabs — small pills ── */
        .result-tabs {
            display: flex;
            gap: 2px;
            padding: 3px;
            background: rgba(10, 18, 35, 0.5);
            border: 1px solid rgba(175, 215, 255, 0.1);
            border-radius: 8px;
            width: fit-content;
        }

        .result-tab {
            padding: 5px 14px;
            background: transparent;
            border: none;
            border-radius: 6px;
            color: #8787af;
            font-size: 11px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        .result-tab:hover {
            color: #afd7ff;
            background: rgba(175, 215, 255, 0.06);
        }

        .result-tab.active {
            background: rgba(175, 215, 255, 0.1);
            color: #afd7ff;
            font-weight: 600;
        }

        /* ── Tab panes ── */
        .result-pane {
            display: none;
        }

        .result-pane.active {
            display: block;
        }

        /* Results content area — shared base */
        .results-body {
            background: rgba(3, 7, 18, 0.25);
            border: 1px solid rgba(175, 215, 255, 0.1);
            border-radius: 10px;
            padding: 24px;
            max-height: 72vh;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.8;
            color: #94a3b8;
        }

        /* Content pane — prose font for readability */
        #paneContent .results-body {
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            line-height: 1.75;
        }

        /* Stats pane — mono font, no outer border (cards handle it) */
        #paneStats .results-body {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            background: transparent;
            border: none;
            padding: 0;
        }

        /* Markdown-like rendering */
        .results-body h1, .results-body h2, .results-body h3 {
            color: #ff87af;
            font-family: 'DM Sans', sans-serif;
            margin: 20px 0 8px 0;
            font-weight: 700;
        }
        .results-body h1 { font-size: 18px; border-bottom: 1px solid rgba(175, 215, 255, 0.1); padding-bottom: 8px; margin-top: 0; }
        .results-body h2 { font-size: 14px; color: #afd7ff; }
        .results-body h3 { font-size: 12px; color: #8787af; text-transform: uppercase; letter-spacing: 1px; }

        .results-body code {
            background: rgba(175, 215, 255, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            font-family: 'DM Mono', monospace;
            color: #afd7ff;
        }

        .results-body pre {
            background: rgba(3, 7, 18, 0.6);
            border: 1px solid rgba(175, 215, 255, 0.08);
            border-radius: 8px;
            padding: 14px;
            margin: 10px 0;
            overflow-x: auto;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
        }
        .results-body pre code {
            background: none;
            padding: 0;
        }

        .results-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 12px;
        }
        .results-body th {
            text-align: left;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(175, 215, 255, 0.15);
            color: #ff87af;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 10px;
        }
        .results-body td {
            padding: 6px 12px;
            border-bottom: 1px solid rgba(175, 215, 255, 0.05);
            color: #94a3b8;
        }
        .results-body tr:hover td {
            background: rgba(175, 215, 255, 0.03);
        }

        .results-body ul, .results-body ol {
            padding-left: 20px;
            margin: 8px 0;
        }
        .results-body li {
            margin: 4px 0;
        }
        .results-body li::marker {
            color: #8787af;
        }

        .results-body hr {
            border: none;
            border-top: 1px solid rgba(175, 215, 255, 0.08);
            margin: 16px 0;
        }

        .results-body a {
            color: #afd7ff;
            text-decoration: none;
        }
        .results-body a:hover {
            text-decoration: underline;
        }

        .results-body blockquote {
            border-left: 3px solid rgba(255, 135, 175, 0.3);
            padding-left: 14px;
            margin: 10px 0;
            color: #8787af;
            font-style: italic;
        }

        /* ── Stats pane ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: rgba(10, 18, 35, 0.4);
            border: 1px solid rgba(175, 215, 255, 0.08);
            border-radius: 8px;
            padding: 12px 14px;
        }

        .stat-card .stat-value {
            font-size: 18px;
            font-weight: 700;
            font-family: 'DM Mono', monospace;
            color: #afd7ff;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-card .stat-label {
            font-size: 10px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            color: #8787af;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .log-stream {
            background: rgba(3, 7, 18, 0.5);
            border: 1px solid rgba(175, 215, 255, 0.06);
            border-radius: 8px;
            padding: 14px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            line-height: 1.7;
            color: #8787af;
            max-height: 280px;
            overflow-y: auto;
        }

        .log-stream .log-line {
            display: flex;
            gap: 10px;
        }

        .log-stream .log-ts {
            color: #475569;
            flex-shrink: 0;
        }

        .log-stream .log-level {
            flex-shrink: 0;
            font-weight: 600;
        }

        .log-stream .log-level.info { color: #afd7ff; }
        .log-stream .log-level.ok { color: #4ade80; }
        .log-stream .log-level.warn { color: #ff87af; }

        .log-stream .log-msg {
            color: #94a3b8;
        }

        /* Scrollbar */
        .results-body::-webkit-scrollbar,
        .log-stream::-webkit-scrollbar {
            width: 6px;
        }
        .results-body::-webkit-scrollbar-track,
        .log-stream::-webkit-scrollbar-track {
            background: transparent;
        }
        .results-body::-webkit-scrollbar-thumb,
        .log-stream::-webkit-scrollbar-thumb {
            background: rgba(175, 215, 255, 0.2);
            border-radius: 10px;
        }
        .results-body::-webkit-scrollbar-thumb:hover,
        .log-stream::-webkit-scrollbar-thumb:hover {
            background: rgba(175, 215, 255, 0.4);
        }

        /* Processing spinner */
        .spinner {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 1.5px solid rgba(255, 135, 175, 0.2);
            border-radius: 50%;
            border-top-color: #ff87af;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Neural surge glow on interface card when firing */
        .interface-card.firing {
            border-color: rgba(255, 135, 175, 0.3);
            box-shadow:
                0 0 80px rgba(255, 135, 175, 0.1),
                0 0 30px rgba(175, 215, 255, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
        }

        .omnibox.firing {
            border-color: rgba(255, 135, 175, 0.4);
            box-shadow: 0 0 20px rgba(255, 135, 175, 0.15);
        }

        /* Tighter card when results are showing */
        .container.has-results .interface-card {
            padding: 14px;
        }

        /* ── Recent pane ── */
        #paneRecent .results-body {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            padding: 0;
            background: transparent;
            border: none;
        }

        .recent-table {
            width: 100%;
            border-collapse: collapse;
        }

        .recent-table th {
            text-align: left;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(175, 215, 255, 0.15);
            color: #8787af;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 10px;
            font-family: 'DM Sans', sans-serif;
        }

        .recent-table td {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(175, 215, 255, 0.05);
            color: #94a3b8;
            font-size: 12px;
            white-space: nowrap;
        }

        .recent-table tr:hover td {
            background: rgba(175, 215, 255, 0.03);
        }

        .recent-table .status-dot-cell {
            width: 20px;
            text-align: center;
        }

        .recent-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .recent-dot.done {
            background: #4ade80;
            box-shadow: 0 0 6px rgba(74, 222, 128, 0.4);
        }

        .recent-dot.failed {
            background: #ff87af;
            box-shadow: 0 0 6px rgba(255, 135, 175, 0.4);
        }

        .recent-mode {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #afd7ff;
            font-weight: 500;
        }

        .recent-mode svg {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
        }

        .recent-url {
            color: #8787af;
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .recent-duration {
            color: #afd7ff;
            font-variant-numeric: tabular-nums;
        }

        .recent-chunks {
            color: #94a3b8;
            font-variant-numeric: tabular-nums;
        }

        .recent-time {
            color: #475569;
            font-size: 11px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .logo {
                font-size: 18px;
                letter-spacing: 6px;
            }

            .interface-card {
                padding: 14px;
            }

            .mode-selector span {
                display: none;
            }

            .mode-dropdown {
                grid-template-columns: repeat(2, 1fr);
            }

            .results-body {
                padding: 16px;
                font-size: 12px;
            }
        }

        /* ── Docker Bridge Connection Indicator ── */
        .ws-indicator {
            position: fixed;
            bottom: 12px;
            right: 12px;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(3, 7, 18, 0.6);
            border: 1px solid rgba(175, 215, 255, 0.08);
            border-radius: 6px;
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: #475569;
            letter-spacing: 0.5px;
            opacity: 0.5;
            transition: opacity 0.3s ease, border-color 0.3s ease;
            user-select: none;
            cursor: default;
        }
        .ws-indicator:hover {
            opacity: 1;
        }
        .ws-indicator .ws-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #334155;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }
        .ws-indicator.connected .ws-dot {
            background: #22c55e;
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
        }
        .ws-indicator.connected {
            border-color: rgba(34, 197, 94, 0.15);
            color: #64748b;
        }
        .ws-indicator.reconnecting .ws-dot {
            background: #f59e0b;
            box-shadow: 0 0 6px rgba(245, 158, 11, 0.4);
            animation: pulse-dot 1s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <!-- Neural Network Canvas Background -->
    <canvas id="neural-canvas"></canvas>

    <!-- Docker Bridge Connection Indicator -->
    <div class="ws-indicator" id="wsIndicator">
        <div class="ws-dot"></div>
        <span id="wsLabel">BRIDGE OFF</span>
    </div>

    <!-- Logo — fixed top-left -->
    <div class="logo">AXON</div>

    <!-- Main Interface -->
    <div class="container">
        <div class="interface-card">
            <!-- Omnibox: [input] | [mode ▸] -->
            <div class="omnibox" id="omnibox">
                <input
                    type="text"
                    class="url-input"
                    placeholder="Enter URL or query..."
                    id="urlInput"
                    autocomplete="off"
                >

                <!-- Inline status — appears between input and action button -->
                <div class="omnibox-status" id="omniboxStatus">
                    <div class="status-dot" id="statusDotInline"></div>
                    <div class="omnibox-status-text" id="statusTextInline"></div>
                </div>

                <div class="omnibox-divider"></div>

                <!-- Left: click = execute -->
                <button class="action-label" id="actionLabel" type="button" title="Execute">
                    <svg class="mode-icon" id="modeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <span id="modeName">Scrape</span>
                </button>

                <!-- Right: click = toggle dropdown. Arrow → or ↓ -->
                <button class="action-arrow" id="actionArrow" type="button" title="Select mode">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </button>

                <!-- Dropdown menu -->
                <div class="mode-dropdown" id="modeDropdown">
                    <button class="mode-option active" data-mode="scrape" data-icon="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                        <svg class="option-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>

# Axon

Self-hosted web crawling and RAG pipeline powered by Spider.rs. Single binary (`axon`) backed by a local Docker stack.

## Overview

Axon is a single CLI for crawl/scrape/extract plus local vector retrieval and Q&A. It runs on a local Docker stack (Postgres, Redis, RabbitMQ, Qdrant) and external model endpoints (TEI and OpenAI-compatible API).

## Features

- Commands: `scrape`, `crawl`, `map`, `search`, `batch`, `extract`, `embed`, `query`, `retrieve`, `ask`, `evaluate`, `suggest`, `sources`, `domains`, `stats`, `status`, `doctor`, `dedupe`, `debug`
- Async queue-backed jobs for `crawl`/`batch`/`extract`/`embed`
- TEI embeddings + Qdrant vector storage
- OpenAI-compatible extraction and answer generation
- Browser fallback via Selenium WebDriver for dynamic sites
- Automation-friendly JSON mode via `--json`

## Architecture

### Crate Layout (`crates/*`)

- `crates/cli` — command routing and UX
- `crates/core` — config, HTTP, health checks, logging, content transforms
- `crates/crawl` — crawling engine and sitemap backfill
- `crates/extract` — placeholder module (extraction logic lives in `vector/ops`)
- `crates/jobs` — queue workers for crawl/batch/extract/embed
- `crates/vector` — embeddings + Qdrant operations (`query/retrieve/ask/evaluate/suggest/sources/domains/stats/dedupe`)

### Docker Services (`docker-compose.yaml`)

- `axon-postgres` — `localhost:53432`
- `axon-redis` — `localhost:53379`

| `scrape <url>` | Single-page scrape to markdown | No |
| `crawl <url>` | Full site crawl, saves markdown files | Yes |
| `map <url>` | Discover all URLs without scraping | No |
| `batch <urls...>` | Bulk scrape multiple URLs | Yes |
| `extract <urls...>` | LLM-powered structured data extraction | Yes |
| `search <query>` | Web search via Tavily, auto-queues crawl jobs | No |
| `research <query>` | Web research via Tavily AI search with LLM synthesis | No |
| `embed [input]` | Embed file/dir/URL into Qdrant | Yes |
| `query <text>` | Semantic vector search | No |
| `retrieve <url>` | Fetch stored document chunks from Qdrant | No |
| `ask <question>` | RAG: search + LLM answer | No |
| `evaluate <question>` | RAG vs baseline + LLM judge | No |
| `suggest [focus]` | Suggest complementary docs URLs | No |
| `github <repo>` | Ingest GitHub repo into Qdrant | Yes |
| `reddit <target>` | Ingest subreddit into Qdrant | Yes |
| `youtube <url>` | Ingest YouTube transcript into Qdrant | Yes |
| `sources` | List all indexed URLs + chunk counts | No |
| `domains` | List indexed domains + stats | No |
| `stats` | Qdrant collection stats | No |
| `status` | Show async job queue status | No |

### Job Subcommands

```bash
axon crawl status <job_id>
axon crawl cancel <job_id>
axon crawl errors <job_id>
axon crawl list
axon crawl cleanup
axon crawl clear
axon crawl recover    # reclaim stale/interrupted jobs
axon crawl worker     # run a worker inline
```

## Worker Model (s6 Supervised)

`axon-workers` uses `s6-overlay` and runs four long-lived worker services in one container:

- `crawl-worker` — `/usr/local/bin/axon crawl worker`
- `batch-worker` — `/usr/local/bin/axon batch worker`
- `extract-worker` — `/usr/local/bin/axon extract worker`
- `embed-worker` — `/usr/local/bin/axon embed worker`

Startup loads `.env` via `docker/s6/cont-init.d/10-load-axon-env`. Health checks verify each worker process via s6-svstat. The container is resource-limited to 4 CPUs / 4 GB RAM with a 512 MB / 1 CPU reservation.

## Environment

Copy `.env.example` to `.env`. At minimum set the required vars:

### Required

| Variable | Description |
|----------|-------------|
| `POSTGRES_USER` / `POSTGRES_PASSWORD` / `POSTGRES_DB` | Docker Compose Postgres credentials |
| `REDIS_PASSWORD` | Docker Compose Redis password |
| `RABBITMQ_USER` / `RABBITMQ_PASS` | Docker Compose RabbitMQ credentials |
| `AXON_PG_URL` | PostgreSQL DSN for CLI/workers |
| `AXON_REDIS_URL` | Redis DSN for health checks and cancel flags |
| `AXON_AMQP_URL` | AMQP DSN for queue-backed jobs |
| `QDRANT_URL` | Qdrant base URL |
| `TEI_URL` | TEI embeddings base URL |
| `OPENAI_BASE_URL` | OpenAI-compatible base URL for extract/ask/suggest/debug |
| `OPENAI_API_KEY` | API key for OPENAI_BASE_URL |
| `OPENAI_MODEL` | Model name for completions |

## Performance Profiles

Concurrency tuned relative to available CPU cores:

| Profile | Crawl | Sitemap | Backfill | Timeout | Retries | Backoff |
|---------|-------|---------|----------|---------|---------|---------|
| `high-stable` (default) | CPUs x8 (64-192) | CPUs x12 (64-256) | CPUs x6 (32-128) | 20s | 2 | 250ms |
| `balanced` | CPUs x4 (32-96) | CPUs x6 (32-128) | CPUs x3 (16-64) | 30s | 2 | 300ms |
| `extreme` | CPUs x16 (128-384) | CPUs x20 (128-512) | CPUs x10 (64-256) | 15s | 1 | 100ms |
| `max` | CPUs x24 (256-1024) | CPUs x32 (256-1536) | CPUs x20 (128-1024) | 12s | 1 | 50ms |

## Gotchas

### `--wait false` (default) = fire-and-forget
By default, `crawl`, `batch`, `extract`, and `embed` enqueue jobs and return immediately. Use `--wait true` to block until completion.

### `render-mode auto-switch`
The default mode. Runs an HTTP crawl first; if >60% of pages are thin, automatically retries with Chrome.

### `ask` LLM call pattern
`ask` constructs the URL as: `{OPENAI_BASE_URL}/chat/completions`
- **Correct:** `OPENAI_BASE_URL=http://host/v1`
- **Wrong:** `OPENAI_BASE_URL=http://host/v1/chat/completions`

### TEI batch size / 413 handling
`tei_embed()` auto-splits batches on HTTP 413 (Payload Too Large). Set `TEI_MAX_CLIENT_BATCH_SIZE` to control default chunk size (default: 64, max: 128).

### Text chunking
`chunk_text()` splits at 2000 chars with 200-char overlap. Each chunk = one Qdrant point.

        // Color palette: primary=#ff87af (pink), accent=#afd7ff (light blue), subtle=#8787af (steel)

            subtle:  { r: 135, g: 135, b: 175 },   // 103 steel blue

        // Perlin-like noise for organic movement
        class SimplexDrift {
            constructor() {
                this.offsetX = Math.random() * 1000;
                this.offsetY = Math.random() * 1000;
                this.speed = 0.0003 + Math.random() * 0.0004;
            }
            get(time) {
                const t = time * this.speed;
                // Layered sine waves approximate organic drift
                const x = Math.sin(t + this.offsetX) * 0.3
                        + Math.sin(t * 2.3 + this.offsetX * 1.7) * 0.15
                        + Math.sin(t * 4.1 + this.offsetX * 0.3) * 0.05;
                const y = Math.sin(t * 0.9 + this.offsetY) * 0.3
                        + Math.sin(t * 1.8 + this.offsetY * 1.3) * 0.15
                        + Math.sin(t * 3.7 + this.offsetY * 0.7) * 0.05;
                return { x, y };
            }
        }

        // Dendrite with curved, organic branching (Bezier curves)
        class Dendrite {
            constructor(x, y, angle, length, depth = 0) {
                this.baseAngle = angle;
                this.baseLength = length;
                this.depth = depth;
                this.branches = [];
                this.waveOffset = Math.random() * Math.PI * 2;
                this.waveSpeed = 0.0008 + Math.random() * 0.0005;

                // Control point offset for curvature
                this.curvature = (Math.random() - 0.5) * length * 0.4;

                this.startX = x;
                this.startY = y;
                this.endX = x + Math.cos(angle) * length;
                this.endY = y + Math.sin(angle) * length;

                // Perpendicular control point
                const perpAngle = angle + Math.PI / 2;
                this.cpX = (this.startX + this.endX) / 2 + Math.cos(perpAngle) * this.curvature;
                this.cpY = (this.startY + this.endY) / 2 + Math.sin(perpAngle) * this.curvature;

                // Dendritic spines (small bumps along the dendrite — where synapses form)
                this.spines = [];
                if (depth < 3) {
                    const spineCount = Math.floor(Math.random() * 3) + 1;
                    for (let i = 0; i < spineCount; i++) {
                        this.spines.push({
                            t: 0.2 + Math.random() * 0.6,
                            angle: (Math.random() - 0.5) * Math.PI,
                            length: 3 + Math.random() * 5
                        });
                    }
                }

                // Branch deeper with tapering probability
                if (depth < 3 && Math.random() > 0.3 + depth * 0.15) {
                    const branchCount = depth < 2 ? Math.floor(Math.random() * 2) + 1 : 1;
                    for (let i = 0; i < branchCount; i++) {
                        const branchAngle = angle + (Math.random() - 0.5) * Math.PI / 2.5;
                        const branchLength = length * (0.45 + Math.random() * 0.25);
                        this.branches.push(new Dendrite(this.endX, this.endY, branchAngle, branchLength, depth + 1));
                    }
                }

                const sway = Math.sin(time * this.waveSpeed + this.waveOffset) * 2;

                // Organic curved dendrite
                ctx.beginPath();
                ctx.moveTo(this.startX, this.startY);
                ctx.quadraticCurveTo(this.cpX + sway, this.cpY + sway, this.endX, this.endY);
                ctx.strokeStyle = rgba(COLORS.accent, alpha * 0.5);
                ctx.lineWidth = Math.max(0.5, 2.5 - this.depth * 0.6);

                    const px = (1 - t) * (1 - t) * this.startX + 2 * (1 - t) * t * (this.cpX + sway) + t * t * this.endX;
                    const py = (1 - t) * (1 - t) * this.startY + 2 * (1 - t) * t * (this.cpY + sway) + t * t * this.endY;
                    const sx = px + Math.cos(spine.angle) * spine.length;
                    const sy = py + Math.sin(spine.angle) * spine.length;

                    ctx.beginPath();
                    ctx.moveTo(px, py);
                    ctx.lineTo(sx, sy);
                    ctx.strokeStyle = rgba(COLORS.accent, alpha * 0.3);
                    ctx.lineWidth = 0.8;

                    // Tiny spine head
                    ctx.beginPath();
                    ctx.arc(sx, sy, 1.2, 0, Math.PI * 2);
                    ctx.fillStyle = rgba(COLORS.accent, alpha * 0.4);
                    ctx.fill();
                });

                this.branches.forEach(branch => branch.draw(opacity, time));
            }

            getTip() {
                if (this.branches.length === 0) {
                    return { x: this.endX, y: this.endY };
                }
                return this.branches[Math.floor(Math.random() * this.branches.length)].getTip();
            }

            updatePosition(newStartX, newStartY) {
                const dx = newStartX - this.startX;
                const dy = newStartY - this.startY;
                this.startX = newStartX;
                this.startY = newStartY;
                this.endX += dx;
                this.endY += dy;
                this.cpX += dx;
                this.cpY += dy;
                this.branches.forEach(branch => branch.updatePosition(this.endX, this.endY));
            }
        }

        // Axon with myelin sheaths (gaps = Nodes of Ranvier) and curved path
        class Axon {
            constructor(x, y) {
                this.startX = x;
                this.startY = y;

                const baseAngle = Math.random() * Math.PI * 2;
                const length = 80 + Math.random() * 120;

                this.segments = [];
                let currentX = x;
                let currentY = y;
                let currentAngle = baseAngle;

                const segmentCount = 4 + Math.floor(Math.random() * 3);
                const segmentLength = length / segmentCount;

                for (let i = 0; i < segmentCount; i++) {
                    currentAngle += (Math.random() - 0.5) * 0.35;
                    const nextX = currentX + Math.cos(currentAngle) * segmentLength;
                    const nextY = currentY + Math.sin(currentAngle) * segmentLength;

                    this.segments.push({
                        startX: currentX,
                        startY: currentY,
                        endX: nextX,
                        endY: nextY,
                        isMyelin: i > 0 && i < segmentCount - 1 // inner segments have myelin
                    });

                    currentX = nextX;
                    currentY = nextY;
                }

                this.terminalX = currentX;
                this.terminalY = currentY;

                // Axon terminal boutons (branching endings)
                this.boutons = [];
                const boutonCount = 2 + Math.floor(Math.random() * 3);
                for (let i = 0; i < boutonCount; i++) {
                    const bAngle = currentAngle + (Math.random() - 0.5) * Math.PI / 2;
                    const bLength = 8 + Math.random() * 15;
                    this.boutons.push({
                        x: currentX + Math.cos(bAngle) * bLength,
                        y: currentY + Math.sin(bAngle) * bLength,
                        radius: 2.5 + Math.random() * 2
                    });
                }
            }

            draw(opacity) {
                this.segments.forEach((segment, i) => {
                    ctx.beginPath();
                    ctx.moveTo(segment.startX, segment.startY);
                    ctx.lineTo(segment.endX, segment.endY);

                    if (segment.isMyelin) {
                        // Myelin sheath — thicker, lighter (subtle color)
                        ctx.strokeStyle = rgba(COLORS.subtle, opacity * 0.35);
                        ctx.lineWidth = 4;
                        ctx.stroke();

                        // Inner axon fiber
                        ctx.beginPath();
                        ctx.moveTo(segment.startX, segment.startY);
                        ctx.lineTo(segment.endX, segment.endY);
                        ctx.strokeStyle = rgba(COLORS.primary, opacity * 0.4);
                        ctx.lineWidth = 1.5;
                        ctx.stroke();

                        // Node of Ranvier (gap between myelin) — small bright ring
                        ctx.beginPath();
                        ctx.arc(segment.endX, segment.endY, 3, 0, Math.PI * 2);
                        ctx.strokeStyle = rgba(COLORS.primary, opacity * 0.6);
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    } else {
                        // Unmyelinated segment (axon hillock / terminal)
                        ctx.strokeStyle = rgba(COLORS.primary, opacity * 0.45);
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                });

                // Axon terminal boutons
                this.boutons.forEach(bouton => {
                    // Connection line
                    ctx.beginPath();
                    ctx.moveTo(this.terminalX, this.terminalY);
                    ctx.lineTo(bouton.x, bouton.y);
                    ctx.strokeStyle = rgba(COLORS.primary, opacity * 0.3);
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    // Bouton (synaptic vesicle cluster)
                    ctx.beginPath();
                    ctx.arc(bouton.x, bouton.y, bouton.radius, 0, Math.PI * 2);
                    ctx.fillStyle = rgba(COLORS.primary, opacity * 0.6);
                    ctx.fill();

                    // Glow
                    const g = ctx.createRadialGradient(bouton.x, bouton.y, 0, bouton.x, bouton.y, bouton.radius * 2.5);
                    g.addColorStop(0, rgba(COLORS.primary, opacity * 0.3));
                    g.addColorStop(1, rgba(COLORS.primary, 0));
                    ctx.beginPath();
                    ctx.arc(bouton.x, bouton.y, bouton.radius * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = g;
                    ctx.fill();
                });
            }

            updatePosition(newStartX, newStartY) {
                const dx = newStartX - this.startX;
                const dy = newStartY - this.startY;
                this.startX = newStartX;
                this.startY = newStartY;
                this.segments.forEach(s => {
                    s.startX += dx; s.startY += dy;
                    s.endX += dx;   s.endY += dy;
                });
                this.terminalX += dx;
                this.terminalY += dy;
                this.boutons.forEach(b => { b.x += dx; b.y += dy; });
            }

            getTerminal() {
                return { x: this.terminalX, y: this.terminalY };
            }
        }

        // Neuron with Hodgkin-Huxley inspired membrane potential
        class Neuron {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = 6 + Math.random() * 4;
                this.drift = new SimplexDrift();

                // Membrane potential model (simplified Hodgkin-Huxley)
                this.potential = -70; // resting potential (mV)
                this.threshold = -55; // firing threshold
                this.restingPotential = -70;
                this.peakPotential = 40;
                this.refractoryTime = 0;
                this.refractoryDuration = 80 + Math.random() * 40; // ms
                this.isFiring = false;
                this.firePhase = 0; // 0=resting, 1=depolarizing, 2=repolarizing, 3=hyperpolarizing
                this.fireTimer = 0;

                // Spontaneous activity (some neurons fire randomly)
                this.spontaneousRate = Math.random() < 0.15 ? 0.001 + Math.random() * 0.002 : 0;

                // Excitatory post-synaptic potential accumulator
                this.epsp = 0;

                // Create dendrites
                this.dendrites = [];
                const dendriteCount = 4 + Math.floor(Math.random() * 4);
                for (let i = 0; i < dendriteCount; i++) {
                    const angle = (Math.PI * 2 / dendriteCount) * i + (Math.random() - 0.5) * 0.5;
                    const length = 30 + Math.random() * 50;
                    this.dendrites.push(new Dendrite(this.x, this.y, angle, length));
                }

                // Create axon
                this.axon = new Axon(this.x, this.y);

                // Outgoing connections (filled after all neurons created)
                this.outgoingConnections = [];
            }

            receiveSignal(strength = 15) {
                if (this.refractoryTime > 0) return;
                this.epsp += strength;
            }

            update(time, dt) {
                // Organic drift (Brownian-like, not linear bouncing)
                const d = this.drift.get(time);
                this.x += d.x;
                this.y += d.y;

                // Soft boundary wrapping
                const margin = 100;
                if (this.x < -margin) this.x = canvas.width + margin;
                if (this.x > canvas.width + margin) this.x = -margin;
                if (this.y < -margin) this.y = canvas.height + margin;
                if (this.y > canvas.height + margin) this.y = -margin;

                this.dendrites.forEach(d => d.updatePosition(this.x, this.y));
                this.axon.updatePosition(this.x, this.y);

                // Membrane potential dynamics
                if (this.refractoryTime > 0) {
                    this.refractoryTime -= dt;
                    this.potential += (this.restingPotential - 5 - this.potential) * 0.05; // hyperpolarization
                    this.epsp = 0;
                    return;
                }

                // Spontaneous depolarization (pacemaker neurons)
                if (this.spontaneousRate > 0 && Math.random() < this.spontaneousRate) {
                    this.epsp += 20;
                }

                // EPSP integration — leaky integrate-and-fire
                this.potential += this.epsp * 0.5;
                this.epsp *= 0.85; // decay

                // Leak current toward resting
                this.potential += (this.restingPotential - this.potential) * 0.02;

                // Action potential
                if (!this.isFiring && this.potential >= this.threshold) {
                    this.isFiring = true;
                    this.firePhase = 1;
                    this.fireTimer = 0;
                }

                if (this.isFiring) {
                    this.fireTimer += dt;

                    if (this.firePhase === 1) {
                        // Rapid depolarization
                        this.potential += (this.peakPotential - this.potential) * 0.3;
                        if (this.potential > this.peakPotential - 5) {
                            this.firePhase = 2;
                        }
                    } else if (this.firePhase === 2) {
                        // Repolarization
                        this.potential += (this.restingPotential - 10 - this.potential) * 0.15;
                        if (this.potential < this.restingPotential) {
                            this.firePhase = 0;
                            this.isFiring = false;
                            this.refractoryTime = this.refractoryDuration;
                            this.potential = this.restingPotential - 8; // undershoot
                        }
                    }
                }
            }

            draw(time) {
                // Map membrane potential to visual intensity
                const potentialNorm = Math.max(0, Math.min(1,
                    (this.potential - this.restingPotential) / (this.peakPotential - this.restingPotential)
                ));

                // Resting membrane flicker
                const flicker = Math.sin(time * 0.002 + this.x * 0.01) * 0.05 + 0.95;
                const baseOpacity = (0.3 + potentialNorm * 0.7) * flicker;

                // Draw axon
                this.axon.draw(baseOpacity);

                // Draw dendrites
                this.dendrites.forEach(d => d.draw(baseOpacity, time));

                // Soma glow — intensity reflects membrane potential
                const glowRadius = this.radius * (2 + potentialNorm * 2);
                const glowGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowRadius);

                if (this.isFiring) {
                    // Firing: bright primary (pink) flash
                    glowGrad.addColorStop(0, rgba(COLORS.primary, 0.7 * potentialNorm));
                    glowGrad.addColorStop(0.5, rgba(COLORS.accent, 0.3 * potentialNorm));
                    glowGrad.addColorStop(1, rgba(COLORS.primary, 0));
                } else {
                    // Resting: subtle glow
                    glowGrad.addColorStop(0, rgba(COLORS.subtle, 0.2 * baseOpacity));
                    glowGrad.addColorStop(1, rgba(COLORS.subtle, 0));
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, glowRadius, 0, Math.PI * 2);
                ctx.fillStyle = glowGrad;
                ctx.fill();

                // Soma body — color shifts with potential
                const somaColor = this.isFiring ? COLORS.primary : COLORS.subtle;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = rgba(somaColor, 0.5 + potentialNorm * 0.4);
                ctx.fill();

                // Soma membrane ring
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 1, 0, Math.PI * 2);
                ctx.strokeStyle = rgba(COLORS.accent, 0.2 + potentialNorm * 0.3);
                ctx.lineWidth = 1;
                ctx.stroke();

                // Nucleus
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.35, 0, Math.PI * 2);
                ctx.fillStyle = rgba(COLORS.accent, 0.4 + potentialNorm * 0.3);
                ctx.fill();
            }

            getRandomDendriteTip() {
                const d = this.dendrites[Math.floor(Math.random() * this.dendrites.length)];
                return d.getTip();
            }
        }

        // Synaptic fiber — thin thread between axon terminal and dendrite tip
        class SynapticConnection {
            constructor(preNeuron, postNeuron, preTerminal, dendriteTip) {
                this.preNeuron = preNeuron;
                this.postNeuron = postNeuron;
                this.preTerminal = preTerminal;
                this.dendriteTip = dendriteTip;
                this.strength = 0.3 + Math.random() * 0.7;
            }
        }

        // Batched connection renderer — one path per opacity bucket, no setLineDash
        function drawConnections(conns, time) {
            // Group into 3 opacity buckets to minimize state changes
            const buckets = [[], [], []];
            for (let i = 0; i < conns.length; i++) {
                const c = conns[i];
                const dx = c.dendriteTip.x - c.preTerminal.x;
                const dy = c.dendriteTip.y - c.preTerminal.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 280) continue; // cull off-screen-ish

                const baseAlpha = (1 - dist / 280) * 0.18 * c.strength;
                // Intensity boost: fibers glow brighter during surge
                const alpha = baseAlpha + neuralIntensity * baseAlpha * 1.5;

                if (alpha > 0.12) buckets[0].push(c);
                else if (alpha > 0.06) buckets[1].push(c);
                else buckets[2].push(c);
            }

            const alphas = [0.14, 0.08, 0.04];
            const widths = [0.6, 0.4, 0.3];

            // During surge, boost all alphas
            const boost = 1 + neuralIntensity * 2;

            for (let b = 0; b < 3; b++) {
                if (buckets[b].length === 0) continue;
                ctx.strokeStyle = rgba(COLORS.subtle, Math.min(alphas[b] * boost, 0.35));
                ctx.lineWidth = widths[b];
                ctx.beginPath();
                for (let i = 0; i < buckets[b].length; i++) {
                    const c = buckets[b][i];
                    ctx.moveTo(c.preTerminal.x, c.preTerminal.y);
                    ctx.lineTo(c.dendriteTip.x, c.dendriteTip.y);
                }
                ctx.stroke();
            }
        }

        // Lean action potential — small dot, no trail, no particles, no gradients
        class ActionPotential {
            constructor(neuron, connection) {
                this.neuron = neuron;
                this.connection = connection;
                this.segments = neuron.axon.segments;
                this.phase = 'axon';
                this.progress = 0;
                this.currentSegment = 0;
                this.active = true;
                this.synapseTimer = 0;
                this.baseSpeed = 0.02 + Math.random() * 0.015;
            }

            update(dt) {
                if (this.phase === 'axon') {
                    const seg = this.segments[this.currentSegment];
                    this.progress += seg.isMyelin ? this.baseSpeed * 3 : this.baseSpeed;
                    if (this.progress >= 1) {
                        this.currentSegment++;
                        this.progress = 0;
                        if (this.currentSegment >= this.segments.length) {
                            this.phase = 'synapse';
                            this.synapseTimer = 0;
                        }
                    }
                } else if (this.phase === 'synapse') {
                    this.synapseTimer += 0.04;
                    if (this.synapseTimer >= 1) {
                        this.connection.postNeuron.receiveSignal(10 * this.connection.strength);
                        this.phase = 'dendrite';
                        this.progress = 0;
                    }
                } else if (this.phase === 'dendrite') {
                    this.progress += this.baseSpeed * 1.5;
                    if (this.progress >= 1) this.active = false;
                }
            }

            draw() {
                if (!this.active) return;

                let x, y;

                if (this.phase === 'axon') {
                    const seg = this.segments[this.currentSegment];
                    const t = Math.min(this.progress, 1);
                    x = seg.startX + (seg.endX - seg.startX) * t;
                    y = seg.startY + (seg.endY - seg.startY) * t;
                } else if (this.phase === 'synapse') {
                    const pre = this.connection.preTerminal;
                    const post = this.connection.dendriteTip;
                    x = pre.x + (post.x - pre.x) * this.synapseTimer;
                    y = pre.y + (post.y - pre.y) * this.synapseTimer;
                } else if (this.phase === 'dendrite') {
                    const start = this.connection.dendriteTip;
                    const end = this.connection.postNeuron;
                    x = start.x + (end.x - start.x) * this.progress;
                    y = start.y + (end.y - start.y) * this.progress;
                }

                if (x === undefined) return;

                // Small bright dot
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = rgba(COLORS.primary, 0.9);
                ctx.fill();
            }
        }

        // --- Initialization ---
        const neurons = [];
        const neuronCount = 80;
        const signals = [];
        const connections = [];

        for (let i = 0; i < neuronCount; i++) {
            neurons.push(new Neuron());
        }

        // Build dense synaptic web — connect aggressively for thick fiber mesh
        neurons.forEach((neuron, i) => {
            const terminal = neuron.axon.getTerminal();

            // Also connect from boutons for extra density
            const endpoints = [terminal, ...neuron.axon.boutons.map(b => ({ x: b.x, y: b.y }))];

            neurons.forEach((target, j) => {
                if (i === j) return;
                endpoints.forEach(ep => {
                    target.dendrites.forEach(dendrite => {
                        const tip = dendrite.getTip();
                        const dx = ep.x - tip.x;
                        const dy = ep.y - tip.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        // Wider radius, higher probability — creates the dense mesh
                        if (dist < 280 && Math.random() > 0.45) {
                            const conn = new SynapticConnection(neuron, target, ep, tip);
                            connections.push(conn);
                            neuron.outgoingConnections.push(conn);
                        }
                    });
                });
            });
        });

        let lastTime = 0;

        // Neural intensity: 0 = ambient idle, 1 = full surge
        let neuralIntensity = 0;
        let targetIntensity = 0;

        function setNeuralIntensity(target) {
            targetIntensity = Math.max(0, Math.min(1, target));
        }

        function animate(currentTime) {
            const dt = Math.min(currentTime - lastTime, 50);
            lastTime = currentTime;

            // Smooth intensity lerp — fast attack, slow release
            const lerpRate = targetIntensity > neuralIntensity ? 0.12 : 0.02;
            neuralIntensity += (targetIntensity - neuralIntensity) * lerpRate;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Canvas opacity responds to intensity
            canvas.style.opacity = 0.75 + neuralIntensity * 0.25;

            // Draw batched connection fibers
            drawConnections(connections, currentTime);

            // Update and draw neurons
            neurons.forEach(neuron => {
                neuron.update(currentTime, dt);
                neuron.draw(currentTime);

                // When a neuron fires, propagate — but sparingly
                if (neuron.isFiring && neuron.firePhase === 1 && neuron.fireTimer < dt * 2) {
                    // Only send a couple signals per firing, not every connection
                    const outgoing = neuron.outgoingConnections;
                    const maxSignals = 2 + Math.floor(neuralIntensity * 5);
                    let sent = 0;
                    for (let c = 0; c < outgoing.length && sent < maxSignals; c++) {
                        if (Math.random() < outgoing[c].strength * 0.4) {
                            signals.push(new ActionPotential(neuron, outgoing[c]));
                            sent++;
                        }
                    }
                }

                // Surge mode: push neurons toward threshold
                if (neuralIntensity > 0.1 && !neuron.isFiring && neuron.refractoryTime <= 0) {
                    if (Math.random() < neuralIntensity * 0.025) {
                        neuron.epsp += 25;
                    }
                }
            });

            // Update and draw signals
            for (let i = signals.length - 1; i >= 0; i--) {
                signals[i].update(dt);
                signals[i].draw();
                if (!signals[i].active) signals.splice(i, 1);
            }

            // Much lower cap — sparse pips, not a lightshow
            while (signals.length > 60) signals.shift();

            requestAnimationFrame(animate);
        }

        animate(0);

        // ── Omnibox UI ──
        const omnibox       = document.getElementById('omnibox');
        const urlInput      = document.getElementById('urlInput');
        const actionLabel   = document.getElementById('actionLabel');
        const actionArrow   = document.getElementById('actionArrow');
        const modeIcon      = document.getElementById('modeIcon');
        const modeName      = document.getElementById('modeName');
        const modeDropdown  = document.getElementById('modeDropdown');
        const resultsPanel      = document.getElementById('resultsPanel');
        const resultsBody       = document.getElementById('resultsBody');
        const resultsStats      = document.getElementById('resultsStats');
        const resultTabs        = document.getElementById('resultTabs');
        const omniboxStatus     = document.getElementById('omniboxStatus');
        const statusDotInline   = document.getElementById('statusDotInline');
        const statusTextInline  = document.getElementById('statusTextInline');
        const interfaceCard     = document.querySelector('.interface-card');
        const container         = document.querySelector('.container');

        // Tab switching
        resultTabs.addEventListener('click', (e) => {
            const tab = e.target.closest('.result-tab');
            if (!tab) return;
            const pane = tab.dataset.pane;
            resultTabs.querySelectorAll('.result-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.result-pane').forEach(p => p.classList.remove('active'));
            document.getElementById('pane' + pane.charAt(0).toUpperCase() + pane.slice(1)).classList.add('active');
        });
        const modeOptions   = modeDropdown.querySelectorAll('.mode-option');

        let currentMode = 'scrape';
        let isProcessing = false;
        let hasExecuted = false;

        // Arrow toggles dropdown
        actionArrow.addEventListener('click', (e) => {
            e.stopPropagation();
            omnibox.classList.toggle('dropdown-open');
        });

        // Label executes
        actionLabel.addEventListener('click', (e) => {
            e.stopPropagation();
            execute();
        });

        // Select mode from dropdown
        modeOptions.forEach(option => {
            option.addEventListener('click', (e) => {
                e.stopPropagation();
                modeOptions.forEach(o => o.classList.remove('active'));
                option.classList.add('active');

                currentMode = option.dataset.mode;
                modeName.textContent = option.textContent.trim();

                const iconPath = option.dataset.icon;
                modeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${iconPath}"/>`;

                omnibox.classList.remove('dropdown-open');
                urlInput.focus();
            });
        });

        // Close dropdown
        document.addEventListener('click', (e) => {
            if (!omnibox.contains(e.target)) omnibox.classList.remove('dropdown-open');
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') omnibox.classList.remove('dropdown-open');
        });

        // Execute — slide up, expand panel, fire neurons
        function execute() {
            const input = urlInput.value.trim();
            if (!input || isProcessing) return;
            isProcessing = true;

            omnibox.classList.remove('dropdown-open');

            // First execution: slide container from center to top
            if (!hasExecuted) {
                hasExecuted = true;
                container.classList.add('has-results');
            }

            // Fire up the neural network
            setNeuralIntensity(1);
            interfaceCard.classList.add('firing');
            omnibox.classList.add('firing');

            // Show processing state in omnibox inline status
            statusDotInline.className = 'status-dot processing';
            statusTextInline.innerHTML = `<span class="spinner"></span> processing`;
            omniboxStatus.classList.add('visible');
            resultsBody.innerHTML = '';
            resultsStats.innerHTML = '';
            resultsPanel.classList.add('expanded');

            // Reset to Content tab
            resultTabs.querySelectorAll('.result-tab').forEach(t => t.classList.toggle('active', t.dataset.pane === 'content'));
            document.querySelectorAll('.result-pane').forEach(p => p.classList.remove('active'));
            document.getElementById('paneContent').classList.add('active');

            // Simulate result
            const startTime = Date.now();
            setTimeout(() => {
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                const chunks = Math.floor(800 + Math.random() * 900);
                const tokens = Math.floor(18000 + Math.random() * 12000);

                statusDotInline.className = 'status-dot done';
                statusTextInline.innerHTML = `<span>${currentMode}</span> &bull; ${elapsed}s &bull; <span>${chunks.toLocaleString()} chunks</span> &bull; <span>1024d</span>`;

                resultsBody.innerHTML = renderContent(input, chunks, tokens);
                resultsStats.innerHTML = renderStats(input, elapsed, chunks, tokens);

                setNeuralIntensity(0.15);
                setTimeout(() => {
                    setNeuralIntensity(0);
                    interfaceCard.classList.remove('firing');
                    omnibox.classList.remove('firing');
                }, 3000);

                isProcessing = false;
            }, 2200);
        }

        // Lightweight markdown-to-HTML parser
        function parseMarkdown(md) {
            let html = '';
            const lines = md.split('\n');
            let i = 0;
            let inList = false;
            let listType = '';

            function esc(s) {
                return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            function inline(s) {
                // Bold + italic
                s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
                // Bold
                s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                // Italic
                s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
                // Inline code
                s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
                // Links
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                return s;
            }

            function closeList() {
                if (inList) {
                    html += listType === 'ul' ? '</ul>\n' : '</ol>\n';
                    inList = false;
                }
            }

            while (i < lines.length) {
                const line = lines[i];

                // Fenced code blocks
                if (line.trimStart().startsWith('```')) {
                    closeList();
                    const lang = line.trim().slice(3).trim();
                    i++;
                    let code = '';
                    while (i < lines.length && !lines[i].trimStart().startsWith('```')) {
                        code += esc(lines[i]) + '\n';
                        i++;
                    }
                    i++; // skip closing ```
                    html += `<pre><code>${code}</code></pre>\n`;
                    continue;
                }

                // Blank line
                if (line.trim() === '') {
                    closeList();
                    i++;
                    continue;
                }

                // Headers
                const hMatch = line.match(/^(#{1,6})\s+(.+)/);
                if (hMatch) {
                    closeList();
                    const level = hMatch[1].length;
                    html += `<h${level}>${inline(hMatch[2])}</h${level}>\n`;
                    i++;
                    continue;
                }

                // Horizontal rule
                if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line.trim())) {
                    closeList();
                    html += '<hr>\n';
                    i++;
                    continue;
                }

                // Table
                if (line.includes('|') && i + 1 < lines.length && /^\s*\|?\s*[-:]+/.test(lines[i + 1])) {
                    closeList();
                    // Parse header
                    const headers = line.split('|').map(c => c.trim()).filter(c => c);
                    i++; // skip separator
                    i++;
                    html += '<table><tr>';
                    headers.forEach(h => { html += `<th>${inline(h)}</th>`; });
                    html += '</tr>\n';
                    while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
                        const cells = lines[i].split('|').map(c => c.trim()).filter(c => c);
                        html += '<tr>';
                        cells.forEach(c => { html += `<td>${inline(c)}</td>`; });
                        html += '</tr>\n';
                        i++;
                    }
                    html += '</table>\n';
                    continue;
                }

                // Blockquote
                if (line.trimStart().startsWith('>')) {
                    closeList();
                    let bq = '';
                    while (i < lines.length && lines[i].trimStart().startsWith('>')) {
                        bq += lines[i].replace(/^\s*>\s?/, '') + ' ';
                        i++;
                    }
                    html += `<blockquote>${inline(bq.trim())}</blockquote>\n`;
                    continue;
                }

                // Unordered list
                if (/^\s*[-*+]\s/.test(line)) {
                    if (!inList || listType !== 'ul') {
                        closeList();
                        html += '<ul>\n';
                        inList = true;
                        listType = 'ul';
                    }
                    html += `<li>${inline(line.replace(/^\s*[-*+]\s/, ''))}</li>\n`;
                    i++;
                    continue;
                }

                // Ordered list
                if (/^\s*\d+\.\s/.test(line)) {
                    if (!inList || listType !== 'ol') {
                        closeList();
                        html += '<ol>\n';
                        inList = true;
                        listType = 'ol';
                    }
                    html += `<li>${inline(line.replace(/^\s*\d+\.\s/, ''))}</li>\n`;
                    i++;
                    continue;
                }

                // Paragraph
                closeList();
                let para = '';
                while (i < lines.length && lines[i].trim() !== '' && !/^#{1,6}\s/.test(lines[i]) && !/^\s*[-*+]\s/.test(lines[i]) && !/^\s*\d+\.\s/.test(lines[i]) && !lines[i].trimStart().startsWith('```') && !lines[i].trimStart().startsWith('>') && !/^(-{3,}|\*{3,}|_{3,})\s*$/.test(lines[i].trim()) && !(lines[i].includes('|') && i + 1 < lines.length && /^\s*\|?\s*[-:]+/.test(lines[i + 1]))) {
                    para += lines[i] + ' ';
                    i++;
                }
                if (para.trim()) {
                    html += `<p>${inline(para.trim())}</p>\n`;
                }
            }
            closeList();
            return html;
        }

        // ── Docker Stats WebSocket Bridge ─────────────────────────────────
        // Connects to axon-ws-bridge.py and maps real container metrics
        // to the neural network animation. Falls back gracefully if
        // the bridge is unavailable.

        (function initDockerBridge() {
            const WS_URL = 'ws://localhost:9876';
            const MAX_BACKOFF = 30000;  // 30s max reconnect delay
            const BASE_BACKOFF = 1000;  // 1s initial delay

            const wsIndicator = document.getElementById('wsIndicator');
            const wsLabel = document.getElementById('wsLabel');

            let ws = null;
            let reconnectAttempts = 0;
            let reconnectTimer = null;
            let bridgeActive = false;
            let lastStats = null;

            // Assign neurons to container clusters — each container
            // "owns" a roughly equal slice of the neuron array
            const containerNeuronMap = new Map();
            let assignedContainers = [];

            function assignNeuronClusters(containerNames) {
                containerNeuronMap.clear();
                assignedContainers = containerNames.sort();
                if (assignedContainers.length === 0) return;

                const perContainer = Math.floor(neurons.length / assignedContainers.length);
                assignedContainers.forEach((name, idx) => {
                    const start = idx * perContainer;
                    const end = idx === assignedContainers.length - 1
                        ? neurons.length
                        : start + perContainer;
                    containerNeuronMap.set(name, { start, end });
                });
            }

            function setStatus(state, label) {
                wsIndicator.className = 'ws-indicator ' + state;
                wsLabel.textContent = label;
            }

            function connect() {
                if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) {
                    return;
                }

                try {
                    ws = new WebSocket(WS_URL);
                } catch (e) {
                    scheduleReconnect();
                    return;
                }

                ws.onopen = function() {
                    reconnectAttempts = 0;
                    bridgeActive = true;
                    setStatus('connected', 'BRIDGE LIVE');
                };

                ws.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'stats') {
                            handleStats(data);
                        }
                    } catch (e) {
                        // malformed message, ignore
                    }
                };

                ws.onclose = function() {
                    bridgeActive = false;
                    lastStats = null;
                    setStatus('reconnecting', 'RECONNECTING');
                    scheduleReconnect();
                };

                ws.onerror = function() {
                    // onclose will fire after this
                };
            }

            function scheduleReconnect() {
                if (reconnectTimer) return;
                const delay = Math.min(BASE_BACKOFF * Math.pow(2, reconnectAttempts), MAX_BACKOFF);
                reconnectAttempts++;
                setStatus('reconnecting', 'RETRY ' + Math.round(delay / 1000) + 's');
                reconnectTimer = setTimeout(() => {
                    reconnectTimer = null;
                    connect();
                }, delay);
            }

            function handleStats(data) {
                lastStats = data;
                const agg = data.aggregate || {};
                const containers = data.containers || {};
                const names = Object.keys(containers);

                // Re-assign neuron clusters if container set changed
                if (names.length !== assignedContainers.length ||
                    !names.every(n => assignedContainers.includes(n))) {
                    assignNeuronClusters(names);
                }

                // ── Map aggregate CPU → neuralIntensity ──
                // Total CPU across all containers, normalized.
                // With ~6 containers, 100% total ≈ moderate load.
                // Scale so that ~200% total CPU = 0.5 intensity,
                // ~600% = full intensity (all cores busy).
                const containerCount = data.container_count || 1;
                const maxExpectedCpu = containerCount * 100; // 100% per container
                const cpuNorm = Math.min(agg.cpu_percent / maxExpectedCpu, 1.0);

                // Only drive intensity from bridge when not in a user-triggered
                // surge (execute() sets intensity to 1.0, let that decay naturally)
                if (!isProcessing) {
                    // Baseline idle: 0.02, scaling up to 0.85 under heavy load
                    // Reserve 0.85-1.0 for user-triggered execute() surges
                    const bridgeIntensity = 0.02 + cpuNorm * 0.83;
                    setNeuralIntensity(bridgeIntensity);
                }

                // ── Map per-container CPU → neuron cluster EPSP injection ──
                for (const [name, metrics] of Object.entries(containers)) {
                    const cluster = containerNeuronMap.get(name);
                    if (!cluster) continue;

                    const containerCpu = metrics.cpu_percent / 100; // 0-1+
                    const netRate = (metrics.net_rx_rate + metrics.net_tx_rate);

                    for (let i = cluster.start; i < cluster.end; i++) {
                        const neuron = neurons[i];
                        if (!neuron || neuron.isFiring || neuron.refractoryTime > 0) continue;

                        // CPU-driven excitation: higher CPU → more likely to inject EPSP
                        if (Math.random() < containerCpu * 0.08) {
                            neuron.epsp += 15 + containerCpu * 20;
                        }
                    }

                    // ── Map network I/O rate → action potential firing ──
                    // High network I/O spawns extra signals from this cluster's neurons.
                    // Scale: >100KB/s starts being noticeable, >1MB/s is intense.
                    const netIntensity = Math.min(netRate / (1024 * 1024), 1.0);
                    if (netIntensity > 0.01) {
                        const firingNeurons = [];
                        for (let i = cluster.start; i < cluster.end; i++) {
                            if (neurons[i] && neurons[i].isFiring) {
                                firingNeurons.push(neurons[i]);
                            }
                        }

                        // Inject extra action potentials proportional to network rate
                        const extraSignals = Math.floor(netIntensity * 4);
                        for (let s = 0; s < extraSignals; s++) {
                            // Pick a random neuron in the cluster and stimulate it
                            const idx = cluster.start + Math.floor(Math.random() * (cluster.end - cluster.start));
                            const n = neurons[idx];
                            if (n && !n.isFiring && n.refractoryTime <= 0) {
                                n.epsp += 30 + netIntensity * 25;
                            }
                        }
                    }
                }

                // Update indicator with container count + total CPU
                setStatus('connected',
                    'BRIDGE ' + data.container_count + '×' +
                    ' CPU ' + agg.cpu_percent.toFixed(0) + '%'
                );
            }

            // Start connection
            connect();

            // Expose for debugging in console
            window._dockerBridge = {
                getStats: () => lastStats,
                isActive: () => bridgeActive,
                reconnect: () => { reconnectAttempts = 0; connect(); },
                getNeuronMap: () => Object.fromEntries(containerNeuronMap),
            };
        })();
